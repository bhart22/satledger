  const [keepWallets, setKeepWallets] = React.useState(true);
  const [confirmText, setConfirmText] = React.useState('');
  const canConfirm = confirmText.toLowerCase() === 'reset';
  const activeWallets = wallets.filter(w => !w.archived);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header" style={{background:'var(--red-light)',borderBottom:'1px solid var(--red)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.625rem'}}>
            <span style={{color:'var(--red)',display:'flex'}}>{Icon.Warning({width:20,height:20})}</span>
            <div className="modal-title" style={{color:'var(--red)'}}>Reset Data</div>
          </div>
          <button className="btn-icon" onClick={onClose}>{Icon.X()}</button>
        </div>

        <div className="modal-body" style={{padding:'1.5rem'}}>
          {/* What will be deleted */}
          <div style={{marginBottom:'1.25rem'}}>
            <div style={{fontSize:'.8125rem',fontWeight:600,color:'var(--text-secondary)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.75rem'}}>This will permanently delete</div>
            <div style={{background:'var(--bg-tertiary)',borderRadius:10,padding:'1rem 1.25rem',border:'1px solid var(--border-color)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.5rem'}}>
                <span style={{fontSize:'.875rem',color:'var(--text-primary)'}}>All transactions</span>
                <span style={{fontFamily:'JetBrains Mono',fontSize:'.8125rem',fontWeight:600,color:'var(--red)'}}>{transactions.length}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',opacity:keepWallets?.4:1,transition:'opacity .2s'}}>
                <span style={{fontSize:'.875rem',color:'var(--text-primary)',textDecoration:keepWallets?'line-through':'none'}}>{keepWallets?'Wallets (kept)':'All wallets'}</span>
                <span style={{fontFamily:'JetBrains Mono',fontSize:'.8125rem',fontWeight:600,color:keepWallets?'var(--green)':'var(--red)'}}>{keepWallets?'✓ kept':activeWallets.length}</span>
              </div>
            </div>
          </div>

          {/* Keep wallets toggle */}
          <div style={{background:'var(--bg-tertiary)',borderRadius:10,padding:'1rem 1.25rem',border:'1px solid var(--border-color)',marginBottom:'1.25rem',cursor:'pointer',transition:'border-color .15s',borderColor:keepWallets?'var(--green)':'var(--border-color)'}} onClick={()=>setKeepWallets(k=>!k)}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.75rem'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                <div style={{width:38,height:22,borderRadius:11,background:keepWallets?'var(--green)':'var(--border-color)',transition:'background .2s',position:'relative',flexShrink:0,cursor:'pointer'}}>
                  <div style={{width:16,height:16,borderRadius:8,background:'#fff',position:'absolute',top:3,left:keepWallets?19:3,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>
                </div>
                <div>
                  <div style={{fontSize:'.875rem',fontWeight:600}}>Keep my wallets</div>
                  <div style={{fontSize:'.75rem',color:'var(--text-secondary)',marginTop:'.125rem'}}>Preserve {activeWallets.length} wallet{activeWallets.length!==1?'s':''} and their settings</div>
                </div>
              </div>
            </div>

              <div style={{display:'flex',flexWrap:'wrap',gap:'.375rem',marginTop:'.75rem',paddingTop:'.75rem',borderTop:'1px solid var(--border-color)'}}>
                {activeWallets.slice(0,8).map(w=>(
                  <span key={w.id} style={{fontSize:'.6875rem',fontWeight:600,padding:'.2rem .5rem',borderRadius:5,background:'var(--bitcoin-light)',color:'var(--bitcoin-orange)'}}>{w.name}</span>
                ))}
                {activeWallets.length>8 && <span style={{fontSize:'.6875rem',color:'var(--text-tertiary)',padding:'.2rem 0'}}>+{activeWallets.length-8} more</span>}
              </div>
            )}

          {/* Type RESET to confirm */}
          <div>
            <div style={{fontSize:'.8125rem',fontWeight:500,color:'var(--text-secondary)',marginBottom:'.5rem'}}>
              Type <strong style={{color:'var(--red)',fontFamily:'JetBrains Mono',letterSpacing:'.05em'}}>RESET</strong> to confirm
            </div>
            <input
              className="form-input"
              placeholder="Type RESET"

function WizardWalletSelect({ label, value, wallets, onChange }) {
  const [custom, setCustom] = React.useState(false);
  const isKnown = wallets.some(w => w.name === value);

  // If value is set but not in list, show custom input
  React.useEffect(() => {
    if(value && !wallets.some(w => w.name === value)) setCustom(true);
  }, []);

  return (
    <div>
      <div className="wizard-field-label">{label}</div>
      {!custom ? (
        <select
          className="form-select"
          style={{width:'100%'}}
          value={value}
          onChange={ev => {
            if(ev.target.value === '__custom__') { setCustom(true); onChange(''); }
            else onChange(ev.target.value);
          }}
        >
          <option value="">— Select wallet —</option>
          {wallets.map(w => <option key={w.id} value={w.name}>{w.name}</option>)}
          <option value="__custom__">Other (type manually)...</option>
        </select>
      ) : (
        <div style={{display:'flex',gap:'.375rem'}}>
          <input
            className="form-input"
            style={{flex:1}}
            placeholder="Type wallet name"
            autoFocus
            value={value}
            onChange={ev => onChange(ev.target.value)}
          />
          <button
            type="button"
            className="btn btn-secondary btn-sm"
            onClick={() => { setCustom(false); onChange(''); }}
            title="Back to list"
          >{Icon.X({width:12,height:12})}</button>
        </div>
      )}
      {!value && <div className="wizard-missing">{Icon.Warning({width:12,height:12})} Required</div>}
    </div>
  );
}


function TransferWizard({ transactions, wallets, wizardStep, setWizardStep, wizardEdits, setWizardEdits, setShowWizard, setTransactions, save, showToast }) {
  const incomplete = transactions
    .map((t,i)=>({...t,_idx:i}))
    .filter(t=>t.type==='Transfer'&&(!t.wallet||!t.wallet2)); // Consolidation excluded — same-wallet fee tx
  const total = incomplete.length;
  const isIntro = wizardStep===0;
  const isSummary = wizardStep===total+1;
  const currentTx = (!isIntro&&!isSummary) ? incomplete[wizardStep-1] : null;
  const edit = currentTx ? (wizardEdits[currentTx._idx]||{wallet:currentTx.wallet||'',wallet2:currentTx.wallet2||'',skip:false}) : null;

  const setEdit = (field, val) => {
    if(!currentTx) return;
    const existing = wizardEdits[currentTx._idx] || {wallet:currentTx.wallet||'', wallet2:currentTx.wallet2||'', skip:false};
    setWizardEdits(prev => ({...prev, [currentTx._idx]: {...existing, [field]: val}}));
  };

  const saveCurrentAndNext = () => {
    // Save the current tx immediately if it has both wallets set
    if(currentTx && edit && !edit.skip && edit.wallet && edit.wallet2) {
      const updated = [...transactions];
      updated[currentTx._idx] = {...updated[currentTx._idx], wallet: edit.wallet, wallet2: edit.wallet2};
      setTransactions(updated);
      save(updated, wallets);
    }
    setWizardStep(s => s+1);
  };

  const applyAll = () => {
    // Apply any remaining unapplied edits (e.g. ones revisited via Back)
    let updated = [...transactions];
    Object.entries(wizardEdits).forEach(([idxStr,e]) => {
      if(e.skip) return;
      const i = parseInt(idxStr);
      updated[i] = {...updated[i], wallet: e.wallet||updated[i].wallet, wallet2: e.wallet2||updated[i].wallet2};
    });
    setTransactions(updated);
    save(updated, wallets);
    setShowWizard(false);
    showToast('All transfers saved');
  };

  // Keyboard navigation
  React.useEffect(() => {
    const handler = (e) => {
      // Don't capture when typing in an input/select
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if(e.key === 'ArrowRight' || e.key === 'Enter') {
        e.preventDefault();
        if(isSummary) applyAll();
        else if(isIntro) setWizardStep(s => s+1);
        else saveCurrentAndNext();
      } else if(e.key === 'ArrowLeft' && wizardStep > 0) {
        e.preventDefault();
        setWizardStep(s => s-1);
      } else if(e.key === 'Escape') {
        e.preventDefault();
        setShowWizard(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  });

  const doneCount = Object.values(wizardEdits).filter(e=>!e.skip&&e.wallet&&e.wallet2).length;
  const skipCount = Object.values(wizardEdits).filter(e=>e.skip).length;

  return (
          <div className="wizard-overlay" onClick={()=>setShowWizard(false)}>
            <div className="wizard" onClick={e=>e.stopPropagation()}>

              {/* Header */}
              <div className="wizard-header">
                <div className="wizard-progress">
                  {[...Array(total+2)].map((_,i)=>(
                    <div key={i} className={`wizard-step-dot ${i<wizardStep?'done':i===wizardStep?'active':''}`}/>
                  ))}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div className="wizard-title">
                      {isIntro ? 'Transfer Wallet Wizard' : isSummary ? 'Review & Apply' : `Transfer ${wizardStep} of ${total}`}
                    </div>
                    <div className="wizard-subtitle">
                      {isIntro ? `${total} transfer${total!==1?'s':''} need wallet assignments` :
                       isSummary ? `${doneCount} fixed · ${skipCount} skipped · ${total-doneCount-skipCount} remaining` :
                       fmtDate(currentTx?.date)+' · '+parseFloat(currentTx?.amount||0).toFixed(8)+' BTC'}
                    </div>
                  </div>
                  <button className="btn-icon" onClick={()=>setShowWizard(false)}>{Icon.X()}</button>
                </div>
              </div>

              {/* Body */}
              <div className="wizard-body">

                {/* INTRO STEP */}
                {isIntro && (
                  <div>
                    <div style={{textAlign:'center',padding:'1rem 0 1.5rem'}}>
                      <div style={{fontSize:'3rem',marginBottom:'1rem'}}>↔️</div>
                      <div style={{fontSize:'1rem',fontWeight:600,marginBottom:'.5rem'}}>Assign wallets to your transfers</div>
                      <div style={{fontSize:'.875rem',color:'var(--text-secondary)',maxWidth:400,margin:'0 auto',lineHeight:1.7}}>
                        Each transfer needs a <strong>From</strong> and <strong>To</strong> wallet to track where your BTC moved. We'll walk through each one so you can assign or skip.
                      </div>
                    </div>
                    <div style={{background:'var(--bg-tertiary)',borderRadius:10,padding:'1rem 1.25rem'}}>
                      {incomplete.slice(0,5).map((tx,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.375rem 0',borderBottom:i<Math.min(incomplete.length,5)-1?'1px solid var(--border-color)':'none',fontSize:'.8125rem'}}>
                          <span style={{color:'var(--text-secondary)'}}>{fmtDate(tx.date)}</span>
                          <span style={{fontFamily:'JetBrains Mono',color:'var(--bitcoin-orange)',fontWeight:600}}>{parseFloat(tx.amount||0).toFixed(8)} BTC</span>
                          <span style={{color:'#d97706',fontSize:'.75rem',fontWeight:600}}>
                            {!tx.wallet&&!tx.wallet2?'Missing both':!tx.wallet?'Missing From':'Missing To'}
                          </span>
                        </div>
                      ))}
                      {incomplete.length>5 && <div style={{fontSize:'.75rem',color:'var(--text-tertiary)',textAlign:'center',paddingTop:'.5rem'}}>+{incomplete.length-5} more</div>}
                    </div>
                  </div>
                )}

                {/* TX REVIEW STEP */}
                {!isIntro && !isSummary && currentTx && edit && (
                  <div>
                    <div className={`wizard-tx-card ${edit.skip?'skipped':(!edit.wallet||!edit.wallet2)?'needs-fix':'fixed'}`}>
                      <div className="wizard-tx-meta">
                        <span className="wizard-tx-amount">{parseFloat(currentTx.amount||0).toFixed(8)} BTC</span>
                        <span className="wizard-tx-date">{fmtDate(currentTx.date)}</span>
                        {currentTx.fee && <span style={{fontSize:'.75rem',color:'var(--text-tertiary)'}}>fee: {currentTx.fee} BTC</span>}
                      </div>
                      {currentTx.notes && <div className="wizard-tx-notes">"{currentTx.notes}"</div>}
                    </div>

                    {edit.skip ? (
                      <div style={{textAlign:'center',padding:'1rem',color:'var(--text-secondary)',fontSize:'.875rem'}}>
                        This transfer will be skipped.
                        <button className="btn btn-secondary btn-sm" style={{display:'block',margin:'.75rem auto 0'}}
                          onClick={()=>setEdit('skip',false)}>Undo Skip</button>
                      </div>
                    ) : (
                      <div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:".75rem",alignItems:"start"}}>
                          <WizardWalletSelect
                            label="From Wallet"
                            value={edit.wallet}
                            wallets={wallets}
                            onChange={v=>setEdit('wallet',v)}
                          />
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center",paddingTop:"1.375rem",color:"var(--text-tertiary)",fontSize:"1.25rem"}}>→</div>
                          <WizardWalletSelect
                            label="To Wallet"
                            value={edit.wallet2}
                            wallets={wallets}
                            onChange={v=>setEdit('wallet2',v)}
                          />
                        </div>
                        {edit.wallet && edit.wallet2 && (
                          <div style={{marginTop:'1rem',background:'var(--green-light)',borderRadius:8,padding:'.625rem 1rem',fontSize:'.8125rem',color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:'.5rem'}}>
                            ✓ Ready: {edit.wallet} → {edit.wallet2}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* SUMMARY STEP */}
                {isSummary && (
                  <div>
                    <div style={{marginBottom:'1.25rem'}}>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.75rem',marginBottom:'1.25rem'}}>
                        {[
                          ['Ready to apply',doneCount,'var(--green)'],
                          ['Skipped',skipCount,'var(--text-secondary)'],
                          ['Still incomplete',total-doneCount-skipCount,'#d97706'],
                        ].map(([label,val,color])=>(
                          <div key={label} style={{background:'var(--bg-tertiary)',borderRadius:10,padding:'.875rem',textAlign:'center'}}>
                            <div style={{fontSize:'1.5rem',fontWeight:700,fontFamily:'JetBrains Mono',color}}>{val}</div>
                            <div style={{fontSize:'.75rem',color:'var(--text-secondary)',marginTop:'.25rem'}}>{label}</div>
                          </div>
                        ))}
                      </div>
                      {Object.entries(wizardEdits).filter(([,e])=>!e.skip&&e.wallet&&e.wallet2).map(([idxStr,e])=>{
                        const tx = transactions[parseInt(idxStr)];
                        return (
                          <div key={idxStr} className="wizard-summary-row">
                            <span style={{color:'var(--text-secondary)',fontSize:'.8125rem'}}>{fmtDate(tx?.date)}</span>
                            <span style={{fontFamily:'JetBrains Mono',fontSize:'.8125rem',color:'var(--bitcoin-orange)'}}>{parseFloat(tx?.amount||0).toFixed(8)}</span>
                            <span style={{fontSize:'.8125rem',fontWeight:500}}>{e.wallet} → {e.wallet2}</span>
                            <span style={{color:'var(--green)',fontSize:'.8125rem'}}>✓</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="wizard-footer">
                <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                  {!isIntro && !isSummary && (
                    <button className="btn btn-secondary btn-sm" onClick={()=>setEdit('skip',!edit?.skip)}>
                      {edit?.skip ? 'Undo Skip' : 'Skip for Now'}
                    </button>
                  )}
                  <span style={{fontSize:'.6875rem',color:'var(--text-tertiary)',whiteSpace:'nowrap'}} className="desktop-only">← → to navigate · Esc to close</span>
                </div>
                <div style={{display:'flex',gap:'.625rem'}}>
                  {wizardStep>0 && (
                    <button className="btn btn-secondary" onClick={()=>setWizardStep(s=>s-1)}>← Back</button>
                  )}
                  {!isSummary && (
                    <button
                      className="btn btn-primary"
                      onClick={isIntro ? ()=>setWizardStep(s=>s+1) : saveCurrentAndNext}
                    >
                      {isIntro ? 'Start →' : wizardStep===total ? 'Review →' : 'Next →'}
                    </button>
                  )}
                  {isSummary && (
                    <button className="btn btn-primary" onClick={applyAll}>
                      Done
                    </button>
                  )}
                </div>
              </div>

            </div>
          </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
