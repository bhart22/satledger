  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Google Drive Sync Module
    const GDRIVE_CLIENT_ID = '1022736433382-1iui89030rcghre1ml7je3of5tj5s5li.apps.googleusercontent.com';
    const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
    const GDRIVE_FILENAME = 'btc-tracker-data.json';
    
    const GDriveSync = {
      tokenClient: null,
      accessToken: null,
      tokenExpiry: null,
      fileId: null,
      _initPromise: null,
      
      init() {
        if(this._initPromise) return this._initPromise;
        this._initPromise = new Promise((resolve) => {
          const check = () => {
            if(window.google?.accounts?.oauth2) {
              this.tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GDRIVE_CLIENT_ID,
                scope: GDRIVE_SCOPE,
                callback: () => {},
              });
              // Restore cached token
              try {
                const cached = JSON.parse(localStorage.getItem('btc-gtoken')||'null');
                if(cached && cached.token && cached.expiry > Date.now()) {
                  this.accessToken = cached.token;
                  this.tokenExpiry = cached.expiry;
                }
              } catch {}
              resolve(true);
            } else {
              setTimeout(check, 100);
            }
          };
          check();
          setTimeout(() => resolve(false), 5000);
        });
        return this._initPromise;
      },

      _cacheToken(token, expiresIn) {
        this.accessToken = token;
        // Cache token for 4 hours; ensureToken will silently refresh if Google rejects it
        this.tokenExpiry = Date.now() + 4 * 60 * 60 * 1000;
        localStorage.setItem('btc-gtoken', JSON.stringify({ token, expiry: this.tokenExpiry }));
      },

      _clearToken() {
        this.accessToken = null;
        this.tokenExpiry = null;
        localStorage.removeItem('btc-gtoken');
      },

      isTokenValid() {
        return this.accessToken && this.tokenExpiry && Date.now() < this.tokenExpiry;
      },

      requestToken(interactive) {
        return new Promise((resolve, reject) => {
          if(!this.tokenClient) { reject(new Error('Not initialized')); return; }
          this.tokenClient.callback = (resp) => {
            if(resp.error) { this._clearToken(); reject(resp); return; }
            this._cacheToken(resp.access_token, resp.expires_in);
            resolve(resp.access_token);
          };
          this.tokenClient.error_callback = (err) => { this._clearToken(); reject(err); };
          // Use prompt:'' for silent, prompt:'consent' for interactive
          this.tokenClient.requestAccessToken({ prompt: interactive ? 'consent' : '' });
        });
      },

      async ensureToken() {
        if(this.isTokenValid()) return this.accessToken;
        // Try silent re-auth first
        try {
          await this.requestToken(false);
          return this.accessToken;
        } catch {
          // Silent failed — need interactive
          this._clearToken();
          throw new Error('token_expired');
        }
      },
      
      async _fetch(url, opts={}) {
        const token = await this.ensureToken();
        const r = await fetch(url, {
          ...opts,
          headers: { 'Authorization': 'Bearer ' + token, ...(opts.headers||{}) },
        });
        if(r.status === 401) {
          this._clearToken();
          const newToken = await this.ensureToken();
          return fetch(url, {
            ...opts,
            headers: { 'Authorization': 'Bearer ' + newToken, ...(opts.headers||{}) },
          });
        }
        return r;
      },

      async findFile() {
        // Check cached fileId first
        if(!this.fileId) {
          try { this.fileId = localStorage.getItem('btc-gdrive-fileid') || null; } catch {}
        }
        const r = await this._fetch(
          `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${GDRIVE_FILENAME}'&fields=files(id,name,modifiedTime)`
        );
        const data = await r.json();
        console.log('[GDrive] findFile response:', data);
        if(data.files && data.files.length > 0) {
          this.fileId = data.files[0].id;
          localStorage.setItem('btc-gdrive-fileid', this.fileId);
          return data.files[0];
        }
        this.fileId = null;
        localStorage.removeItem('btc-gdrive-fileid');
        return null;
      },
      
      async pull() {
        await this.ensureToken();
        const file = await this.findFile();
        if(!file) { console.log('[GDrive] pull: no file found'); return null; }
        console.log('[GDrive] pull: reading file', this.fileId);
        const r = await this._fetch(
          `https://www.googleapis.com/drive/v3/files/${this.fileId}?alt=media`
        );
        if(!r.ok) { console.error('[GDrive] pull failed:', r.status, await r.text()); return null; }
        const data = await r.json();
        console.log('[GDrive] pull: got data with', data?.transactions?.length, 'transactions');
        return data;
      },
      
      async push(data) {
        await this.ensureToken();
        const body = JSON.stringify(data);
        console.log('[GDrive] push:', data?.transactions?.length, 'transactions', data?.vault ? 'with vault' : 'without vault');
        
        // Always search for existing file first
        if(!this.fileId) await this.findFile();
        
        if(this.fileId) {
          console.log('[GDrive] push: updating existing file', this.fileId);
          const r = await this._fetch(
            `https://www.googleapis.com/upload/drive/v3/files/${this.fileId}?uploadType=media`,
            { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body }
          );
          if(!r.ok) { console.error('[GDrive] push update failed:', r.status, await r.text()); throw new Error('push failed'); }
        } else {
          console.log('[GDrive] push: creating new file');
          const boundary = 'btc_boundary_' + Date.now();
          const multipart = 
            '--' + boundary + '\r\n' +
            'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
            JSON.stringify({ name: GDRIVE_FILENAME, parents: ['appDataFolder'] }) + '\r\n' +
            '--' + boundary + '\r\n' +
            'Content-Type: application/json\r\n\r\n' +
            body + '\r\n' +
            '--' + boundary + '--';
          const r = await this._fetch(
            'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
            { method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipart }
          );
          if(!r.ok) { console.error('[GDrive] push create failed:', r.status, await r.text()); throw new Error('push failed'); }
          const res = await r.json();
          this.fileId = res.id;
          localStorage.setItem('btc-gdrive-fileid', this.fileId);
          console.log('[GDrive] push: created file', this.fileId);
        }
        return true;
      },
      
      async signOut() {
        if(this.accessToken) {
          try { google.accounts.oauth2.revoke(this.accessToken); } catch {}
          this._clearToken();
          this.fileId = null;
          localStorage.removeItem('btc-gdrive-fileid');
        }
      },
      
      isSignedIn() { return this.isTokenValid(); }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #fafafa; --bg-secondary: #ffffff; --bg-tertiary: #f5f5f5;
      --text-primary: #0a0a0a; --text-secondary: #525252; --text-tertiary: #a3a3a3;
      --border-color: #e5e5e5; --border-hover: #d4d4d4;
      --bitcoin-orange: #f7931a; --bitcoin-light: #fef3e8;
      --main-surface: #f7efe6; --main-dot-color: rgba(247,147,26,1);
      --green: #16a34a; --green-light: #dcfce7; --red: #dc2626; --red-light: #fee2e2;
      --blue: #2563eb; --blue-light: #dbeafe; --purple: #7c3aed; --purple-light: #ede9fe;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1e1e1e;
      --text-primary: #f5f5f5; --text-secondary: #a3a3a3; --text-tertiary: #525252;
      --border-color: #2a2a2a; --border-hover: #404040;
      --main-surface: #120d08; --main-dot-color: rgba(247,147,26,0.65);
      --bitcoin-light: #2a1800; --green-light: #0f2d1a; --red-light: #2d0f0f;
      --blue-light: #0f1d3d; --purple-light: #1e1030;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4); --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.6);
    }
    body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg-primary); color:var(--text-primary); line-height:1.6; -webkit-font-smoothing:antialiased; transition:background .3s,color .3s; }
    .app { min-height:100vh; display:flex; flex-direction:column; }

    /* Header */
    .header { background:var(--bg-secondary); border-bottom:1px solid var(--border-color); padding:.875rem 1.5rem; position:sticky; top:0; z-index:200; box-shadow:var(--shadow-sm); display:flex; align-items:center; gap:.75rem; }
    .header-inner { flex:1; display:flex; justify-content:space-between; align-items:center; gap:1rem; }
    .logo { display:flex; align-items:center; gap:.625rem; text-decoration:none; color:inherit; }
    .logo-icon { width:30px; height:30px; border-radius:50%; flex-shrink:0; object-fit:contain; }
    [data-theme="light"] .logo-icon-dark { display:none; }
    [data-theme="dark"] .logo-icon-light { display:none; }
    .logo-text { font-size:1.0625rem; font-weight:600; letter-spacing:-.02em; white-space:nowrap; display:block; }
    .logo-tagline { font-size:.6875rem; color:var(--text-tertiary); font-weight:400; white-space:nowrap; border-left:1px solid var(--border-color); padding-left:.625rem; margin-left:.25rem; }
    .header-actions { display:flex; gap:.5rem; align-items:center; }
    .hamburger { display:none; width:34px; height:34px; border-radius:7px; background:var(--bg-tertiary); border:1px solid var(--border-color); align-items:center; justify-content:center; cursor:pointer; color:var(--text-primary); font-size:1rem; }
    .hamburger:hover { border-color:var(--border-hover); }
    .sidebar-collapse-btn { width:32px; height:32px; border-radius:7px; background:var(--bg-tertiary); border:1px solid var(--border-color); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary); transition:all .15s; }
    .sidebar-collapse-btn:hover { border-color:var(--border-hover); color:var(--text-primary); background:var(--bg-secondary); }

    /* App body: sidebar + main */
    .app-body { display:flex; flex:1; }

    /* Sidebar */
    .sidebar { width:220px; background:var(--bg-secondary); border-right:1px solid var(--border-color); display:flex; flex-direction:column; flex-shrink:0; transition:width .2s ease; overflow:hidden; height:calc(100vh - 53px); position:fixed; top:53px; z-index:100; }
    .sidebar ~ .main { margin-left:220px; transition:margin-left .2s ease; }
    .sidebar.collapsed ~ .main { margin-left:60px; }
    .sidebar.collapsed { width:60px; }
    .sidebar-nav { flex:1; padding:.5rem; display:flex; flex-direction:column; gap:2px; overflow-y:auto; }
    .sidebar-item { display:flex; align-items:center; gap:.75rem; padding:.625rem .75rem; border-radius:8px; border:none; background:none; cursor:pointer; color:var(--text-secondary); font-size:.875rem; font-weight:500; font-family:inherit; transition:all .15s; white-space:nowrap; width:100%; text-align:left; }
    .sidebar-item:hover { background:var(--bg-tertiary); color:var(--text-primary); }
    .sidebar-item.active { background:var(--bitcoin-light); color:var(--bitcoin-orange); font-weight:600; }
    .sidebar-item svg { flex-shrink:0; margin-left:10px; }
    .sidebar-item-label { opacity:1; transition:opacity .15s; }
    .sidebar.collapsed .sidebar-item-label { opacity:0; width:0; overflow:hidden; }
    .sidebar.collapsed .sidebar-item { justify-content:center; padding:.625rem 1rem; }
    .sidebar-theme { padding:.625rem .5rem; display:flex; align-items:center; justify-content:center; gap:.75rem; }
    .sidebar-theme-toggle { width:38px; height:22px; border-radius:11px; border:none; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0; margin-left:0; }
    .sidebar-theme-toggle.light { background:var(--border-color); }
    .sidebar-theme-toggle.dark { background:var(--bitcoin-orange); }
    .sidebar-theme-toggle .toggle-knob { width:16px; height:16px; border-radius:8px; background:#fff; position:absolute; top:3px; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .sidebar-theme-toggle.light .toggle-knob { left:3px; }
    .sidebar-theme-toggle.dark .toggle-knob { left:19px; }
    .sidebar-theme-label { font-size:.8125rem; color:var(--text-secondary); font-weight:500; white-space:nowrap; }
    .sidebar.collapsed .sidebar-theme-label { opacity:0; width:0; overflow:hidden; }
    .sidebar.collapsed .sidebar-theme { justify-content:center; }
    .sidebar-utility-links { border-top:1px solid var(--border-color); padding-top:.25rem; }
    .theme-switch { position:relative; display:inline-block; width:38px; height:22px; flex-shrink:0; }
    .theme-switch input { opacity:0; width:0; height:0; }
    .theme-slider { position:absolute; cursor:pointer; inset:0; background:var(--border-color); border-radius:11px; transition:background .2s; }
    .theme-slider::before { content:''; position:absolute; width:16px; height:16px; border-radius:8px; background:#fff; left:3px; top:3px; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .theme-switch input:checked + .theme-slider { background:var(--bitcoin-orange); }
    .theme-switch input:checked + .theme-slider::before { transform:translateX(16px); }
    .sidebar-version { padding:.375rem .75rem; font-size:.6875rem; color:var(--text-tertiary); font-family:'JetBrains Mono',monospace; text-align:center; border-top:1px solid var(--border-color); }
    .sidebar.collapsed .sidebar-version { font-size:.5625rem; }

    /* Mobile drawer overlay */
    .drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); z-index:300; animation:fadeIn .2s ease; }
    .drawer-overlay.open { display:block; }
    .mobile-drawer { position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--bg-secondary); z-index:310; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; transition:left .25s ease; }
    .mobile-drawer.open { left:0; }
    .mobile-drawer-header { padding:1rem 1.25rem; border-bottom:1px solid var(--border-color); display:flex; align-items:center; justify-content:space-between; }
    .mobile-drawer-nav { flex:1; padding:.75rem; display:flex; flex-direction:column; gap:2px; overflow-y:auto; }

    /* Main */
    .main {
      flex:1; max-width:100%; width:100%; margin:0 auto; padding:1.5rem; min-width:0; overflow-x:hidden;
      background-color:var(--main-surface);
      background-image:radial-gradient(circle, var(--main-dot-color) 1.2px, transparent 1.2px);
      background-size:20px 20px;
      background-position:10px 10px;
    }

    /* Buttons */
    .btn { padding:.5rem 1rem; border-radius:8px; font-size:.8125rem; font-weight:500; border:none; cursor:pointer; transition:all .15s; font-family:inherit; white-space:nowrap; display:inline-flex; align-items:center; gap:.375rem; }
    .btn:active { transform:translateY(1px); }
    .btn-primary { background:var(--bitcoin-orange); color:#fff; }
    .btn-primary:hover { background:#e8890f; box-shadow:var(--shadow-md); }
    .btn-secondary { background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border-color); }
    .btn-secondary:hover { border-color:var(--border-hover); background:var(--bg-secondary); }
    .btn-danger { background:var(--red-light); color:var(--red); border:1px solid var(--red); }
    .btn-danger:hover { background:var(--red); color:#fff; }
    .btn-sm { padding:.375rem .75rem; font-size:.75rem; }
    .btn-icon { width:32px; height:32px; padding:0; border-radius:7px; background:var(--bg-tertiary); border:1px solid var(--border-color); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; font-size:.9375rem; color:var(--text-primary); }
    .btn-icon:hover { border-color:var(--border-hover); background:var(--bg-secondary); color:var(--text-primary); }
    .btn-icon-danger:hover { background:var(--red-light); border-color:var(--red); color:var(--red); }
    [data-theme="dark"] .btn-icon { color:#e5e5e5; border-color:#404040; }
    [data-theme="dark"] .btn-icon:hover { color:#fff; border-color:#525252; }

    /* Cards / Sections */
    .card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; box-shadow:var(--shadow-sm); overflow:hidden; margin-bottom:1.25rem; }
    .settings-grid { column-count:2; column-gap:1.25rem; }
    .settings-grid .card { margin-bottom:1.25rem; break-inside:avoid; display:inline-block; width:100%; }
    @media(max-width:768px) { .settings-grid { column-count:1; } }
    .card-header { padding:1.125rem 1.5rem; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; gap:1rem; }
    .card-title { font-size:1rem; font-weight:600; letter-spacing:-.01em; }
    .card-body { padding:1.25rem 1.5rem; }
    .legal-shell { max-width:960px; margin:0 auto 1rem; }
    .legal-hero { background:linear-gradient(135deg,var(--bg-secondary),var(--bitcoin-light)); border:1px solid var(--border-color); border-radius:16px; box-shadow:var(--shadow-sm); padding:1.5rem; margin-bottom:1.25rem; }
    .legal-kicker { display:inline-flex; align-items:center; gap:.4rem; padding:.2rem .55rem; border-radius:999px; background:var(--bg-tertiary); border:1px solid var(--border-color); color:var(--text-secondary); font-size:.6875rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .legal-title { font-size:1.75rem; line-height:1.15; font-weight:700; letter-spacing:-.03em; margin:.9rem 0 .5rem; }
    .legal-summary { max-width:720px; font-size:.95rem; color:var(--text-secondary); }
    .legal-meta { display:flex; gap:.625rem; flex-wrap:wrap; margin-top:1rem; }
    .legal-meta-chip { display:inline-flex; align-items:center; gap:.35rem; padding:.3rem .65rem; border-radius:999px; background:var(--bg-secondary); border:1px solid var(--border-color); font-size:.75rem; color:var(--text-secondary); }
    .legal-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:14px; box-shadow:var(--shadow-sm); padding:1.25rem 1.5rem; margin-bottom:1rem; }
    .legal-card h2 { font-size:1.02rem; font-weight:700; letter-spacing:-.02em; margin-bottom:.7rem; }
    .legal-card p { color:var(--text-secondary); font-size:.9rem; margin-bottom:.75rem; }
    .legal-card p:last-child { margin-bottom:0; }
    .legal-card ul { margin:0; padding-left:1.1rem; color:var(--text-secondary); }
    .legal-card li { margin:.35rem 0; }
    .legal-actions { display:flex; gap:.625rem; flex-wrap:wrap; margin-top:1rem; }

    /* Stats grid */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin-bottom:1.25rem; }
    .stat-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; padding:1.25rem; box-shadow:var(--shadow-sm); transition:all .2s; }
    .stat-card:hover { box-shadow:var(--shadow-md); border-color:var(--border-hover); }
    .stat-label { font-size:.75rem; color:var(--text-secondary); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-bottom:.375rem; }
    .stat-value { font-size:1.625rem; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-.02em; line-height:1.2; }
    .stat-sub { font-size:.75rem; color:var(--text-tertiary); margin-top:.25rem; }
    .stat-value.btc { color:var(--bitcoin-orange); }
    .stat-value.green { color:var(--green); }
    .stat-value.red { color:var(--red); }
    .values-hidden .stat-value, .values-hidden .stat-sub, .values-hidden .wallet-btc, .values-hidden .wallet-usd, .values-hidden .pie-total, .values-hidden .chart-subtitle { filter:blur(8px); user-select:none; pointer-events:none; }
    .values-hidden .public-data .chart-subtitle { filter:none; user-select:auto; pointer-events:auto; }
    .scope-badge { display:inline-flex; align-items:center; padding:.16rem .45rem; border-radius:999px; border:1px solid var(--border-color); background:var(--bg-tertiary); color:var(--text-tertiary); font-size:.625rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; white-space:nowrap; }

    /* Badges */
    .badge { display:inline-flex; padding:.2rem .5rem; border-radius:5px; font-size:.6875rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
    .badge-buy { background:var(--blue-light); color:var(--blue); }
    .badge-sell { background:var(--red-light); color:var(--red); }
    .badge-transfer { background:var(--purple-light); color:var(--purple); }
    .badge-consolidation { background:var(--blue-light); color:var(--blue); }
    .badge-reward { background:var(--green-light); color:var(--green); }

    /* Table */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.8125rem; }
    thead { background:var(--bg-tertiary); }
    th { padding:.75rem 1rem; text-align:left; font-weight:600; font-size:.6875rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); border-bottom:1px solid var(--border-color); white-space:nowrap; }
    td { padding:.75rem 1rem; border-bottom:1px solid var(--border-color); vertical-align:middle; }
    tbody tr { transition:background .1s; }
    tbody tr:hover { background:var(--bg-tertiary); }
    tbody tr:last-child td { border-bottom:none; }
    .mono { font-family:'JetBrains Mono',monospace; }

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ─── Pre-loaded 2025 Transaction Data ────────────────────────────────────────
const PRELOADED_TRANSACTIONS = [];

const DEFAULT_WALLETS = [];

const PAGE_SIZE = 50;
function useThrottledCallback(fn, delay) {
  const lastRun = React.useRef(0);
  const frameRef = React.useRef(null);
  return React.useCallback((...args) => {
    const now = performance.now();
    if (now - lastRun.current >= delay) {
      lastRun.current = now;
      fn(...args);
    } else if (!frameRef.current) {
      frameRef.current = requestAnimationFrame(() => {
        frameRef.current = null;
        lastRun.current = performance.now();
        fn(...args);
      });
    }
  }, [fn, delay]);
}
const HISTORICAL_PRICE_CACHE_KEY = 'btc-price-history-v1';
const VAULT_STORAGE_KEY = 'btc-vault';
const VAULT_SCHEMA_VERSION = 1;
const VAULT_PBKDF2_ITERATIONS = 250000;
const dayKeyUTC = ts => new Date(ts).toISOString().slice(0,10);
const addDaysUTC = (dateStr, days) => {
  const dt = new Date(dateStr+'T00:00:00Z');
  dt.setUTCDate(dt.getUTCDate()+days);
  return dt.toISOString().slice(0,10);
};
const listDaysUTC = (startDate, endDate) => {
  const days = [];
  for(let d=startDate; d<=endDate; d=addDaysUTC(d,1)) days.push(d);
  return days;
};
const fillDailyPriceGaps = (priceMap, startDate, endDate) => {
  const next = {...priceMap};
  let lastKnown = null;
  listDaysUTC(startDate, endDate).forEach(day => {
    if(next[day]!==undefined) lastKnown = next[day];
    else if(lastKnown!==null) next[day] = lastKnown;
  });
  let nextKnown = null;
  listDaysUTC(startDate, endDate).reverse().forEach(day => {
    if(next[day]!==undefined) nextKnown = next[day];
    else if(nextKnown!==null) next[day] = nextKnown;
  });
  return next;
};
const normalizeDate = value => {
  if(!value) return '';
  const raw = String(value).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const slash = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(slash) {
    const [, month, day, year] = slash;
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  const parsed = new Date(raw);
  if(!Number.isNaN(parsed.getTime())) return parsed.toISOString().slice(0,10);
  return raw;
};
const encoder = new TextEncoder();
const decoder = new TextDecoder();
const toBase64 = bytes => btoa(String.fromCharCode(...bytes));
const fromBase64 = str => Uint8Array.from(atob(str), c => c.charCodeAt(0));
const emptyVaultDraft = () => ({
  overview: '',
  deviceLocations: '',
  recoverySteps: '',
  contacts: '',
  warnings: '',
  estateNotes: '',
  notes: '',
});
const hasVaultContent = draft => Object.values(draft).some(v => String(v||'').trim());
async function deriveVaultKey(passphrase, salt, usage=['encrypt','decrypt']) {
  const baseKey = await crypto.subtle.importKey('raw', encoder.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations: VAULT_PBKDF2_ITERATIONS, hash:'SHA-256' },
    baseKey,
    { name:'AES-GCM', length:256 },
    false,
    usage
  );
}
async function encryptVaultDraft(draft, passphrase, existingVault=null) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveVaultKey(passphrase, salt, ['encrypt']);
  const plaintext = encoder.encode(JSON.stringify({ schemaVersion: VAULT_SCHEMA_VERSION, ...draft }));
  const encrypted = new Uint8Array(await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, plaintext));
  const now = new Date().toISOString();
  return {
    version: VAULT_SCHEMA_VERSION,
    createdAt: existingVault?.createdAt || now,
    updatedAt: now,
    kdf: { name:'PBKDF2', hash:'SHA-256', iterations: VAULT_PBKDF2_ITERATIONS },
    cipher: { name:'AES-GCM' },
    salt: toBase64(salt),
    iv: toBase64(iv),
    encryptedPayload: toBase64(encrypted),
  };
}
async function decryptVaultData(vault, passphrase) {
  const salt = fromBase64(vault.salt);
  const iv = fromBase64(vault.iv);
  const payload = fromBase64(vault.encryptedPayload);
  const key = await deriveVaultKey(passphrase, salt, ['decrypt']);
  const plaintext = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, payload);
  const parsed = JSON.parse(decoder.decode(plaintext));
  return {
    overview: parsed.overview||'',
    deviceLocations: parsed.deviceLocations||'',
    recoverySteps: parsed.recoverySteps||'',
    contacts: parsed.contacts||'',
    warnings: parsed.warnings||'',
    estateNotes: parsed.estateNotes||'',
    notes: parsed.notes||'',

const DEFAULT_RSI_THRESHOLDS = { overbought: 70, oversold: 30 };
const RSI_ZONE_COLORS = {
  neutral: '#ec4899',
  overbought: '#dc2626',
  oversold: '#16a34a',
};

function normalizeRsiThresholds(thresholds) {
  if(thresholds === undefined) return { ...DEFAULT_RSI_THRESHOLDS };
  const rawOverbought = Number(thresholds?.overbought);
  const rawOversold = Number(thresholds?.oversold);
  const overbought = Number.isFinite(rawOverbought) && rawOverbought > 0 && rawOverbought <= 100
    ? rawOverbought
    : null;
  const oversold = Number.isFinite(rawOversold) && rawOversold > 0 && rawOversold <= 100
    ? rawOversold
    : null;
  if(overbought != null && oversold != null && oversold >= overbought) return { ...DEFAULT_RSI_THRESHOLDS };
  return { overbought, oversold };
}

function normalizeSettings(nextSettings) {
  const base = nextSettings && typeof nextSettings === 'object' ? nextSettings : {};
  return {
    defaultTxType: 'Buy',
    ...base,
    rsiThresholds: normalizeRsiThresholds(base.rsiThresholds),
  };
}

function getRsiState(value, thresholds = DEFAULT_RSI_THRESHOLDS) {
  if(value == null || !Number.isFinite(Number(value))) return 'neutral';
  if(thresholds.overbought != null && value >= thresholds.overbought) return 'overbought';
  if(thresholds.oversold != null && value <= thresholds.oversold) return 'oversold';
  return 'neutral';
}

function getRsiColor(value, thresholds = DEFAULT_RSI_THRESHOLDS) {
  return RSI_ZONE_COLORS[getRsiState(value, thresholds)] || RSI_ZONE_COLORS.neutral;
}

function validateRsiThresholdDraft(draft) {
  const rawOverbought = String(draft.overbought ?? '').trim();
  const rawOversold = String(draft.oversold ?? '').trim();
  const overbought = rawOverbought === '' ? null : Number(rawOverbought);
  const oversold = rawOversold === '' ? null : Number(rawOversold);
  if((overbought != null && !Number.isFinite(overbought)) || (oversold != null && !Number.isFinite(oversold))) {
    return { error: 'RSI thresholds must be numeric values.' };
  }
  if((overbought != null && (overbought < 0 || overbought > 100)) || (oversold != null && (oversold < 0 || oversold > 100))) {
    return { error: 'RSI thresholds must stay between 0 and 100.' };
  }
  const normalizedOverbought = overbought && overbought > 0 ? overbought : null;
  const normalizedOversold = oversold && oversold > 0 ? oversold : null;
  if(normalizedOverbought != null && normalizedOversold != null && normalizedOversold >= normalizedOverbought) {
    return { error: 'Oversold must be lower than overbought.' };
  }
  if(normalizedOverbought == null && normalizedOversold == null) {
    return { overbought: null, oversold: null, error: '' };
  }
  if(normalizedOverbought == null || normalizedOversold == null) {
    return { overbought: normalizedOverbought, oversold: normalizedOversold, error: '' };
  }
  return { overbought: normalizedOverbought, oversold: normalizedOversold, error: '' };
}

function buildMovingAverageSeries(allDays) {
  if(!allDays.length) return [];
  const result = [];
  let avgGain = 0;
  let avgLoss = 0;
  for(let i = 0; i < allDays.length; i++) {
    const [date, price] = allDays[i];
    const pt = { date, price };
    if(i >= 49) {
      let sum = 0;
      for(let j = i - 49; j <= i; j++) sum += allDays[j][1];
      pt.ma50d = +(sum / 50).toFixed(2);
    }
    if(i >= 199) {
      let sum = 0;
      for(let j = i - 199; j <= i; j++) sum += allDays[j][1];
      pt.ma200d = +(sum / 200).toFixed(2);
    }
    if(i >= 1399) {
      let sum = 0;
      for(let j = i - 1399; j <= i; j++) sum += allDays[j][1];
      pt.ma200w = +(sum / 1400).toFixed(2);
    }
    if(i === 14) {
      let gains = 0;
      let losses = 0;
      for(let j = 1; j <= 14; j++) {
        const delta = allDays[j][1] - allDays[j-1][1];
        if(delta >= 0) gains += delta;
        else losses += Math.abs(delta);
      }
      avgGain = gains / 14;
      avgLoss = losses / 14;
      const rs = avgLoss === 0 ? Infinity : avgGain / avgLoss;
      pt.rsi14 = +(100 - (100 / (1 + rs))).toFixed(1);
    } else if(i > 14) {
      const delta = allDays[i][1] - allDays[i-1][1];
      const gain = Math.max(delta, 0);
      const loss = Math.max(-delta, 0);
      avgGain = ((avgGain * 13) + gain) / 14;
      avgLoss = ((avgLoss * 13) + loss) / 14;
      const rs = avgLoss === 0 ? Infinity : avgGain / avgLoss;
      pt.rsi14 = +(100 - (100 / (1 + rs))).toFixed(1);
    }
    result.push(pt);
  }
  return result;
}

function DashboardCharts({ transactions, wallets, btcPrice, historicalPrices, historicalPriceLoading, settings, updateSettings, selectedWallets }) {
  const activeWallets = React.useMemo(() => wallets.filter(w => !w.archived), [wallets]);
  const selectedWalletSet = React.useMemo(() => new Set(selectedWallets || []), [selectedWallets]);
  const hasWalletFilter = selectedWalletSet.size > 0;
  const filteredScopeLabel = hasWalletFilter ? 'Selected wallets' : null;
  const globalScopeLabel = hasWalletFilter ? 'Portfolio-wide' : null;
  const { chartData, accumulatedData, dcaData, feeBurnData, rewardData, plData, monthlySummary } = React.useMemo(() => {
    const sorted = transactions
      .map(tx => ({ ...tx, normalizedDate: normalizeDate(tx.date) }))
      .filter(tx => tx.normalizedDate)
      .sort((a,b) => a.normalizedDate.localeCompare(b.normalizedDate));
    let totalCost = 0;
    const walletBalances = {};
    const filteredWalletBalances = {};
    const points = [];
    const accumulatedPoints = [];
    const dcaMap = {};
    let runningBTC = 0;
    let filteredRunningBTC = 0;
    let runningBTCForCost = 0;
    let cumulativeFees = 0;
    let cumulativeRewards = 0;
    let realizedPL = 0;
    const feePoints = [], rewardPoints = [], plPoints = [];
    const monthlyMap = {};
    const ensureWallet = (name) => {
      if(!name) return;
      if(walletBalances[name]===undefined) walletBalances[name]=0;
    };
    const ensureFilteredWallet = (name) => {
      if(!name || !selectedWalletSet.has(name)) return;
      if(filteredWalletBalances[name]===undefined) filteredWalletBalances[name]=0;
    };
    sorted.forEach(tx => {
      const amt = parseFloat(tx.amount)||0;
      const fee = parseFloat(tx.fee)||0;
      const price = parseFloat(tx.price)||0;
      const w1 = tx.wallet;
      const w2 = tx.wallet2;
      const matchesSelected = !hasWalletFilter || selectedWalletSet.has(w1) || selectedWalletSet.has(w2);

      // Always track BTC balance (all transactions, including excluded)
      if(tx.type==='Buy'||tx.type==='Reward') { runningBTC+=amt; }
      else if(tx.type==='Sell') { runningBTC-=amt; }
      else if(tx.type==='Transfer') { runningBTC-=fee; }
      else if(tx.type==='Consolidation') { runningBTC-=fee; }

      // Cost basis — only non-excluded transactions
      if(!tx.excludeStats) {
        if(tx.type==='Buy') {
          runningBTCForCost+=amt;
          totalCost+=(tx.totalUsd ? parseFloat(tx.totalUsd) : (amt*price))+fee;
        } else if(tx.type==='Reward') { runningBTCForCost+=amt; }
        else if(tx.type==='Sell') {
          const avgCostBasis = runningBTCForCost>0.00000001 ? totalCost/runningBTCForCost : 0;
          const proceeds = tx.totalUsd ? parseFloat(tx.totalUsd) : (amt*price);
          const costOfSold = amt * avgCostBasis;
          realizedPL += proceeds - costOfSold;
          const ratio = amt/Math.max(runningBTCForCost,0.00000001);
          totalCost-=totalCost*ratio; runningBTCForCost-=amt;
        } else if(tx.type==='Transfer') { runningBTCForCost-=fee; }
        else if(tx.type==='Consolidation') { runningBTCForCost-=fee; }
      }

      // DCA tracking — Buy transactions only
      if(tx.type==='Buy' && !tx.excludeStats && matchesSelected) {
        const buyUsd = tx.totalUsd ? parseFloat(tx.totalUsd) : (amt * price);
        if(buyUsd > 0) {
          dcaMap[tx.normalizedDate] = (dcaMap[tx.normalizedDate]||0) + buyUsd;
        }
      }

      // Fee burn tracking — only Transfer/Consolidation fees (actual BTC lost to network)
      // Buy/Sell fees are USD-denominated exchange fees, not BTC burn
      if(fee > 0 && !tx.excludeStats && matchesSelected && (tx.type==='Transfer'||tx.type==='Consolidation')) {
        cumulativeFees += fee;
        const lastFee = feePoints[feePoints.length-1];
        if(lastFee && lastFee.date===tx.normalizedDate) feePoints[feePoints.length-1] = { date:tx.normalizedDate, fees:+cumulativeFees.toFixed(8) };
        else feePoints.push({ date:tx.normalizedDate, fees:+cumulativeFees.toFixed(8) });
      }

      // Reward income tracking
      if(tx.type==='Reward' && !tx.excludeStats && matchesSelected) {
        cumulativeRewards += amt;
        const lastRew = rewardPoints[rewardPoints.length-1];
        if(lastRew && lastRew.date===tx.normalizedDate) rewardPoints[rewardPoints.length-1] = { date:tx.normalizedDate, rewards:+cumulativeRewards.toFixed(8) };
        else rewardPoints.push({ date:tx.normalizedDate, rewards:+cumulativeRewards.toFixed(8) });
      }

      // P&L tracking — record realized P&L and cost snapshot at each transaction date
      // Also track totalBtc (all holdings incl. excluded) for portfolio value chart
      if(tx.type==='Buy'||tx.type==='Sell'||tx.type==='Reward'||tx.type==='Transfer'||tx.type==='Consolidation') {
        const lastPL = plPoints[plPoints.length-1];
        const plPt = { date:tx.normalizedDate, realized:+realizedPL.toFixed(2), btcHeld:+runningBTCForCost.toFixed(8), totalBtc:+runningBTC.toFixed(8), costBasis:+totalCost.toFixed(2) };
        if(lastPL && lastPL.date===tx.normalizedDate) plPoints[plPoints.length-1] = plPt;
        else plPoints.push(plPt);
      }

      // Monthly summary
      if(!tx.excludeStats && matchesSelected) {
        const month = tx.normalizedDate.slice(0,7); // YYYY-MM
        if(!monthlyMap[month]) monthlyMap[month] = { buys:0, sells:0, rewards:0, fees:0 };
        const buyUsd = tx.totalUsd ? parseFloat(tx.totalUsd) : (amt*price);
        if(tx.type==='Buy') monthlyMap[month].buys += buyUsd;
        else if(tx.type==='Sell') monthlyMap[month].sells += (tx.totalUsd ? parseFloat(tx.totalUsd) : (amt*price));
        if(tx.type==='Reward') monthlyMap[month].rewards += amt;
        if(fee > 0) monthlyMap[month].fees += fee;
      }

      // Track included-transaction holdings history for dashboard value charts.
      ensureWallet(w1);
      ensureWallet(w2);
      ensureFilteredWallet(w1);
      ensureFilteredWallet(w2);
      if(tx.type==='Buy'||tx.type==='Reward') { if(w1) walletBalances[w1]+=amt; }
      else if(tx.type==='Sell') { if(w1) walletBalances[w1]-=amt; }
      else if(tx.type==='Transfer') {
        if(w1) walletBalances[w1]-=(amt+fee);
        if(w2) walletBalances[w2]+=amt;
      } else if(tx.type==='Consolidation') {
        if(w1) walletBalances[w1]-=fee;
      }
      if(matchesSelected) {
        if(tx.type==='Buy'||tx.type==='Reward') {
          if(selectedWalletSet.has(w1)) {
            filteredRunningBTC += amt;
            filteredWalletBalances[w1] += amt;
          }
        } else if(tx.type==='Sell') {
          if(selectedWalletSet.has(w1)) {
            filteredRunningBTC -= amt;
            filteredWalletBalances[w1] -= amt;
          }
        } else if(tx.type==='Transfer') {
          const fromSelected = selectedWalletSet.has(w1);
          const toSelected = selectedWalletSet.has(w2);
          if(fromSelected) {
            filteredRunningBTC -= (amt + fee);
            filteredWalletBalances[w1] -= (amt + fee);
          }
          if(toSelected) {
            filteredRunningBTC += amt;
            filteredWalletBalances[w2] += amt;
          }
        } else if(tx.type==='Consolidation') {
          if(selectedWalletSet.has(w1)) {
            filteredRunningBTC -= fee;
            filteredWalletBalances[w1] -= fee;
          }
        }
      }
      const totalBTC = runningBTC;
      const avgCost = runningBTCForCost>0.00000001 ? totalCost/runningBTCForCost : null;
      const pt = { date:tx.normalizedDate, btc:+totalBTC.toFixed(8), avgCost:avgCost!==null ? +avgCost.toFixed(2) : null };
      const accumulatedPt = { date:tx.normalizedDate, btc:+(hasWalletFilter ? filteredRunningBTC : totalBTC).toFixed(8) };
      const last = points[points.length-1];
      if(last && last.date===tx.normalizedDate) points[points.length-1]=pt;
      else points.push(pt);
      const lastAccumulated = accumulatedPoints[accumulatedPoints.length-1];
      if(lastAccumulated && lastAccumulated.date===tx.normalizedDate) accumulatedPoints[accumulatedPoints.length-1]=accumulatedPt;
      else accumulatedPoints.push(accumulatedPt);
    });
    // Trim leading zero-BTC points
    while(points.length > 1 && points[0].btc < 0.00000001) {
      points.shift();
    }
    while(accumulatedPoints.length > 1 && accumulatedPoints[0].btc < 0.00000001) {
      accumulatedPoints.shift();
    }
    const dcaPts = Object.entries(dcaMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,buyUsd])=>({date,buyUsd:+buyUsd.toFixed(2)}));
    const monthlyPts = Object.entries(monthlyMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([month, d])=>({
      date: month+'-15', month, buys:+d.buys.toFixed(2), sells:+d.sells.toFixed(2), rewards:+d.rewards.toFixed(8), fees:+d.fees.toFixed(8)
    }));
    return { chartData: points, accumulatedData: accumulatedPoints, dcaData: dcaPts, feeBurnData: feePoints, rewardData: rewardPoints, plData: plPoints, monthlySummary: monthlyPts };
  }, [transactions, wallets, hasWalletFilter, selectedWalletSet]);

  // Time-range filtering
  const rangeFiltered = React.useMemo(() => {
    const range = settings.chartRange || 'All';
    if(range === 'All') return { chart: chartData, accumulated: accumulatedData, dca: dcaData, fees: feeBurnData, rewards: rewardData, pl: plData, monthly: monthlySummary };
    let cutoff;
    if(range === 'Custom') {
      cutoff = settings.chartRangeCustom || '2000-01-01';
    } else if(range === 'YTD') {
      cutoff = new Date().getFullYear() + '-01-01';
    } else {
      const now = new Date();
      const months = { '3M':3, '6M':6, '1Y':12, '5Y':60 };
      const d = new Date(now.getFullYear(), now.getMonth() - (months[range]||0), now.getDate());
      cutoff = d.toISOString().slice(0,10);
    }
    return {
      chart: chartData.filter(d => d.date >= cutoff),
      accumulated: accumulatedData.filter(d => d.date >= cutoff),
      dca: dcaData.filter(d => d.date >= cutoff),
      fees: feeBurnData.filter(d => d.date >= cutoff),
      rewards: rewardData.filter(d => d.date >= cutoff),
      pl: plData.filter(d => d.date >= cutoff),
      monthly: monthlySummary.filter(d => d.date >= cutoff),
    };
  }, [chartData, accumulatedData, dcaData, feeBurnData, rewardData, plData, monthlySummary, settings.chartRange, settings.chartRangeCustom]);

  const costData = React.useMemo(() => rangeFiltered.chart.filter(d=>d.avgCost!==null), [rangeFiltered.chart]);
  // P&L chart data — compute unrealized using historical prices for accuracy
  const plChartData = React.useMemo(() => {
    if(!rangeFiltered.pl.length || !Object.keys(historicalPrices).length) return [];
    // For each date with a historical price, interpolate the realized/cost/holdings from plPoints
    const plPts = rangeFiltered.pl;
    const sortedDates = Object.keys(historicalPrices).filter(d => {
      return plPts.length && d >= plPts[0].date && d <= (plPts[plPts.length-1].date > new Date().toISOString().slice(0,10) ? plPts[plPts.length-1].date : new Date().toISOString().slice(0,10));
    }).sort();
    if(!sortedDates.length) return [];
    let pi = 0;
    return sortedDates.map(date => {
      while(pi < plPts.length-1 && plPts[pi+1].date <= date) pi++;
      const snap = plPts[pi];
      if(!snap || date < snap.date) return null;
      const mktPrice = historicalPrices[date];
      const unrealized = snap.btcHeld > 0.00000001 ? +(snap.btcHeld * mktPrice - snap.costBasis).toFixed(2) : 0;
      return { date, realized: snap.realized, unrealized, totalPL: +(snap.realized + unrealized).toFixed(2) };
    }).filter(Boolean);
  }, [rangeFiltered.pl, historicalPrices]);

  // Portfolio Value vs Cost Basis chart data
  const valueBasisData = React.useMemo(() => {
    if(!rangeFiltered.pl.length || !Object.keys(historicalPrices).length) return [];
    const plPts = rangeFiltered.pl;
    const sortedDates = Object.keys(historicalPrices).filter(d => {
      return plPts.length && d >= plPts[0].date && d <= (plPts[plPts.length-1].date > new Date().toISOString().slice(0,10) ? plPts[plPts.length-1].date : new Date().toISOString().slice(0,10));
    }).sort();
    if(!sortedDates.length) return [];
    let pi = 0;
    return sortedDates.map(date => {
      while(pi < plPts.length-1 && plPts[pi+1].date <= date) pi++;
      const snap = plPts[pi];
      if(!snap || date < snap.date) return null;
      const mktPrice = historicalPrices[date];
      const marketValue = +((snap.totalBtc != null ? snap.totalBtc : snap.btcHeld) * mktPrice).toFixed(2);
      return { date, marketValue, costBasis: +snap.costBasis.toFixed(2) };
    }).filter(Boolean);
  }, [rangeFiltered.pl, historicalPrices]);

  // Waterfall data for BTC flow chart
  const waterfallData = React.useMemo(() => {
    const range = settings.chartRange || 'All';
    let cutoff = '1900-01-01';
    if(range !== 'All') {
      if(range === 'Custom') cutoff = settings.chartRangeCustom || '2000-01-01';
      else if(range === 'YTD') cutoff = new Date().getFullYear() + '-01-01';
      else {
        const now = new Date();
        const months = { '3M':3, '6M':6, '1Y':12, '5Y':60 };
        const d = new Date(now.getFullYear(), now.getMonth() - (months[range]||0), now.getDate());
        cutoff = d.toISOString().slice(0,10);
      }
    }
    const sorted = transactions
      .map(tx => ({ ...tx, normalizedDate: normalizeDate(tx.date) }))
      .filter(tx => tx.normalizedDate)
      .sort((a,b) => a.normalizedDate.localeCompare(b.normalizedDate));
    // Compute starting BTC (all transactions before cutoff)
    let startBTC = 0;
    let buys = 0, rewards = 0, sells = 0, fees = 0;
    sorted.forEach(tx => {
      const amt = parseFloat(tx.amount)||0;
      const fee = parseFloat(tx.fee)||0;
      if(tx.normalizedDate < cutoff) {
        // Before range — accumulate into starting balance
        if(tx.type==='Buy') startBTC += amt;
        else if(tx.type==='Reward') startBTC += amt;
        else if(tx.type==='Sell') startBTC -= amt;
        else if(tx.type==='Transfer'||tx.type==='Consolidation') startBTC -= fee;
      } else {
        // In range — track each category
        if(tx.type==='Buy') buys += amt;
        else if(tx.type==='Reward') rewards += amt;
        else if(tx.type==='Sell') sells += amt;
        if(fee > 0 && (tx.type==='Transfer'||tx.type==='Consolidation')) fees += fee;
      }
    });
    const endBTC = startBTC + buys + rewards - sells - fees;
    return { startBTC: +startBTC.toFixed(8), buys: +buys.toFixed(8), rewards: +rewards.toFixed(8), sells: +sells.toFixed(8), fees: +fees.toFixed(8), endBTC: +endBTC.toFixed(8) };
  }, [transactions, settings.chartRange, settings.chartRangeCustom]);

  // Price overlay data for Accumulated BTC chart
  const priceOverlayData = React.useMemo(() => {
    if(!historicalPrices || !Object.keys(historicalPrices).length) return [];
    const chartDates = rangeFiltered.accumulated;
    if(!chartDates.length) return [];
    const minDate = chartDates[0].date;
    const maxDate = chartDates[chartDates.length-1].date;
    return Object.entries(historicalPrices)
      .filter(([d]) => d >= minDate && d <= maxDate)
      .sort((a,b) => a[0].localeCompare(b[0]))
      .map(([date, price]) => ({ date, price }));
  }, [historicalPrices, rangeFiltered.accumulated]);

  // BTC Price with 200D & 200W Moving Averages
  const maChartData = React.useMemo(() => {
    if(!historicalPrices || !Object.keys(historicalPrices).length) return [];
    const allDays = Object.entries(historicalPrices).sort((a,b)=>a[0].localeCompare(b[0]));
    if(allDays.length < 200) return [];
    const result = buildMovingAverageSeries(allDays);
    // Apply range filter
    const range = settings.chartRange || '1Y';
    if(range === 'All') return result;
    let cutoff;
    if(range === 'Custom') cutoff = settings.chartRangeCustom || '2000-01-01';
    else if(range === 'YTD') cutoff = new Date().getFullYear() + '-01-01';
    else {
      const now = new Date();
      const months = { '3M':3, '6M':6, '1Y':12, '5Y':60 };
      const d = new Date(now.getFullYear(), now.getMonth() - (months[range]||0), now.getDate());
      cutoff = d.toISOString().slice(0,10);
    }
    return result.filter(d => d.date >= cutoff);
  }, [historicalPrices, settings.chartRange, settings.chartRangeCustom]);

  // Sample data for empty state
  const isSample = !chartData.length;
  const sampleChartData = React.useMemo(() => {
    if(!isSample) return {};
    const today = new Date();
    const pts = [], dcaPts = [], feePts = [], rewardPts = [], plPts = [], monthlyPts = [], priceOverlayPts = [], valueBasisPts = [];
    const samplePriceForMonth = (idx) => {
      const trend = 18000 + (24 - idx) * 2200;
      const cycle = Math.sin(idx * 0.55) * 11000;
      const noise = Math.cos(idx * 0.18) * 4500;
      return +(trend + cycle + noise).toFixed(2);
    };
    let btc = 0, cost = 0, fees = 0, rewards = 0, realized = 0;
    for(let i = 24; i >= 0; i--) {
      const d = new Date(today.getFullYear(), today.getMonth() - i, 15);
      const date = d.toISOString().slice(0,10);
      const month = date.slice(0,7);
      const price = samplePriceForMonth(i);
      const buyAmt = 0.01 + Math.random()*0.04;
      const buyUsd = +(buyAmt * price).toFixed(2);
      btc += buyAmt;
      cost += buyUsd;
      const fee = +(Math.random()*0.00005).toFixed(8);
      fees += fee;
      if(i % 4 === 0) { const r = +(0.0001+Math.random()*0.0003).toFixed(8); rewards += r; btc += r; }
      if(i === 8) { const sellAmt = 0.05; const sellUsd = +(sellAmt*price).toFixed(2); const avgCost = cost/btc; realized += sellUsd - sellAmt*avgCost; cost -= avgCost*sellAmt; btc -= sellAmt; }
      const avgCost = btc > 0 ? +(cost/btc).toFixed(2) : null;
      const mktVal = btc * price;
      const unrealized = +(mktVal - cost).toFixed(2);
      pts.push({ date, btc:+btc.toFixed(8), avgCost });
      priceOverlayPts.push({ date, price });
      dcaPts.push({ date, buyUsd });
      feePts.push({ date, fees: +fees.toFixed(8) });
      rewardPts.push({ date, rewards: +rewards.toFixed(8) });
      plPts.push({ date, realized: +realized.toFixed(2), unrealized, totalPL: +(realized+unrealized).toFixed(2) });
      valueBasisPts.push({ date, marketValue: +mktVal.toFixed(2), costBasis: +cost.toFixed(2) });
      monthlyPts.push({ date, month, buys: buyUsd, sells: 0, rewards: 0, fees: 0 });
    }
    const totalDays = 1700;
    const start = new Date(today);
    start.setDate(start.getDate() - (totalDays - 1));
    const dailyPrices = [];
    for(let i = 0; i < totalDays; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      const date = d.toISOString().slice(0,10);
      const trend = 14000 + i * 34;
      const longCycle = Math.sin(i / 82) * 10500;
      const shortCycle = Math.cos(i / 19) * 2200;
      const price = +(trend + longCycle + shortCycle).toFixed(2);
      dailyPrices.push([date, price]);
    }
    const movingAvgPts = buildMovingAverageSeries(dailyPrices);
    return {
      chart: pts,
      dca: dcaPts,
      fees: feePts,
      rewards: rewardPts,
      pl: plPts,
      monthly: monthlyPts,
      priceOverlay: priceOverlayPts,
      movingAvg: movingAvgPts,
      valueBasis: valueBasisPts,
      waterfall: { startBTC: +(pts[0]?.btc||0).toFixed(8), buys: 0.65, rewards: 0.003, sells: 0.05, fees: 0.0002, endBTC: +(pts[pts.length-1]?.btc||0).toFixed(8) },
    };
  }, [isSample]);

  const sc = isSample ? sampleChartData : null;

  const fmtCompactUSD = (v) => {
    const abs = Math.abs(v);
    if(abs >= 1000000) return '$'+(v/1000000).toFixed(1).replace(/\.0$/,'')+'M';
    if(abs >= 1000) return '$'+(v/1000).toFixed(0)+'k';
    return '$'+Math.round(v);
  };

  const visibleChart = isSample ? sc.chart : rangeFiltered.accumulated;
  const chartRangeVal = settings.chartRange || 'All';
  const hc = settings.hiddenCharts || {};
  const effectiveHiddenCharts = isSample && hc.monthly === undefined ? { ...hc, monthly: true } : hc;
  const ml = settings.maLines || {};
  const effectiveMaLines = isSample && ml.rsi14 === undefined ? { ...ml, rsi14: false } : ml;
  const rsiThresholds = normalizeRsiThresholds(settings.rsiThresholds);
  const _costData = isSample ? sc.chart.filter(d=>d.avgCost!==null) : costData;
  const _dca = isSample ? sc.dca : rangeFiltered.dca;
  const _fees = isSample ? sc.fees : rangeFiltered.fees;
  const _rewards = isSample ? sc.rewards : rangeFiltered.rewards;
  const _pl = isSample ? sc.pl : plChartData;
  const _monthly = isSample ? sc.monthly : rangeFiltered.monthly;
  const _valueBasis = isSample ? sc.valueBasis : valueBasisData;
  const _waterfall = isSample ? sc.waterfall : waterfallData;
  const _priceOverlay = isSample ? sc.priceOverlay : priceOverlayData;
  const hasLiveMovingAvg = maChartData.length > 0;
  const _movingAvg = hasLiveMovingAvg ? maChartData : (isSample ? sc.movingAvg : maChartData);
  const walletFilterSelection = (settings.dashboardWalletFilter || []).filter(name => activeWallets.some(w => w.name === name));
  const noFilteredData = hasWalletFilter && !visibleChart.length && !_dca.length && !_fees.length && !_rewards.length && !_monthly.length;
  const S = isSample || undefined; // sampleData prop
  const toggleWalletFilter = (name) => {
    const current = new Set(walletFilterSelection);
    if(current.has(name)) current.delete(name);
    else current.add(name);
    updateSettings({ dashboardWalletFilter: [...current] });
  };
  const renderFilteredEmptyCard = (title) => (
    <div className="card">
      <div className="card-header" style={{alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
          <div className="card-title">{title}</div>
          <span className="scope-badge">Selected wallets</span>
        </div>
      </div>
      <div className="card-body" style={{color:'var(--text-secondary)',fontSize:'.875rem'}}>
        No activity for the selected wallets in this time range.
      </div>
    </div>
  );

  return (
    <>
    {isSample && (
      <div style={{background:'var(--bg-secondary)',border:'1px solid var(--border-color)',borderRadius:12,padding:'1rem 1.25rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'.75rem',flexWrap:'wrap'}}>
        <span style={{color:'var(--text-tertiary)',display:'flex'}}>{Icon.Info({width:20,height:20})}</span>
        <div>
          <div style={{fontWeight:600,fontSize:'.9375rem',color:'var(--text-primary)'}}>Sample Charts</div>
          <div style={{fontSize:'.8125rem',color:'var(--text-secondary)',marginTop:'.125rem'}}>These charts use sample data to preview available visualizations. Add your first transaction to see your real portfolio.</div>
        </div>
      </div>
    )}
    {!isSample && <>
      <div className="dashboard-filter-row">
        <div className="dashboard-filter-label">
          <strong>Dashboard Wallets</strong>
          <span>{hasWalletFilter ? `${walletFilterSelection.length} selected` : 'All active wallets'}</span>
        </div>
        <div className="dashboard-filter-actions">
          <button className={hasWalletFilter ? 'btn btn-secondary btn-sm' : 'btn btn-primary btn-sm'} onClick={() => updateSettings({ dashboardWalletFilter: [] })}>All</button>
        </div>
        <div className="dashboard-wallet-chips">
          {activeWallets.map(wallet => (
            <button
              key={wallet.id}
              className={`wallet-chip ${walletFilterSelection.includes(wallet.name) ? 'active' : ''}`}
              onClick={() => toggleWalletFilter(wallet.name)}
              title={wallet.type}
            >
              <span>{wallet.name}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="dashboard-range-row">
        {['3M','6M','1Y','5Y','YTD','All','Custom'].map(r => (
          <button key={r} onClick={() => updateSettings({ chartRange: r })}
            className={chartRangeVal===r ? 'btn btn-primary' : 'btn btn-secondary'}
            style={{padding:'.25rem .75rem',fontSize:'.75rem'}}>
            {r}
          </button>
        ))}
        {chartRangeVal === 'Custom' && (
          <input type="date"
            value={settings.chartRangeCustom || ''}
            onChange={e => updateSettings({ chartRangeCustom: e.target.value })}
            style={{padding:'.25rem .5rem',fontSize:'.75rem',borderRadius:'8px',
              border:'1px solid var(--border-color)',background:'var(--bg-secondary)',
              color:'var(--text-primary)',fontFamily:'inherit'}}
          />
        )}
      </div>
      {noFilteredData && (
        <div style={{background:'var(--bg-secondary)',border:'1px solid var(--border-color)',borderRadius:12,padding:'1rem 1.25rem',marginBottom:'1rem',fontSize:'.8125rem',color:'var(--text-secondary)'}}>
          No dashboard activity for the selected wallets in this date range.
        </div>
      )}
    </>}
    {(() => {
      const chartRenderers = {
        accumulatedBtc: () => visibleChart.length > 0 ? <SVGChart sampleData={S}
          data={visibleChart} dataKey="btc" title="Accumulated BTC"
          subtitle={visibleChart[visibleChart.length-1]?.btc.toFixed(8)+' BTC total'}
          scopeLabel={filteredScopeLabel}
          color="#f7931a" formatY={v=>v.toFixed(2)}
          formatTooltip={(v)=>{ const usd = btcPrice ? ' · $'+Math.round(v*btcPrice).toLocaleString() : ''; return v.toFixed(8)+' BTC'+usd; }}
          fillGradient={true}
          overlay={_priceOverlay.length > 0 ? { data: _priceOverlay, dataKey: 'price', color: '#6b7280', formatY: fmtCompactUSD, formatTooltip: v => '$'+Math.round(v).toLocaleString(), label: 'BTC Price' } : undefined}
        /> : (hasWalletFilter ? renderFilteredEmptyCard('Accumulated BTC') : null),
        costBasis: () => _costData.length > 1 ? <SVGChart sampleData={S}
          data={_costData} dataKey="avgCost" title="Average Cost Basis"
          subtitle={fmtUSD(_costData[_costData.length-1]?.avgCost||0)+' / BTC'}
          scopeLabel={globalScopeLabel}
          color="#2563eb" formatY={v=>'$'+Math.round(v/1000)+'k'}
          formatTooltip={(v)=>'$'+Math.round(v).toLocaleString()+' avg cost'}
          refLine={isSample?undefined:btcPrice} refLineColor="#16a34a" refLineLabel={isSample?undefined:'Now $'+Math.round(btcPrice||0).toLocaleString()}
        /> : null,
        valueBasis: () => _valueBasis.length > 1 ? <SVGChart sampleData={S}
          data={_valueBasis} dataKey="marketValue" title="Portfolio Value vs Cost Basis"
          subtitle={(() => { const last = _valueBasis[_valueBasis.length-1]; if(!last) return ''; const diff = last.marketValue - last.costBasis; return fmtUSD(last.marketValue) + ' value · ' + (diff>=0?'+':'') + fmtUSD(diff) + ' P&L'; })()}
          scopeLabel={globalScopeLabel}
          color="#16a34a" formatY={fmtCompactUSD}
          formatTooltip={v => fmtUSD(v) + ' market value'}
          fillGradient={true}
          lines={[{ dataKey:'costBasis', color:'#2563eb', label:'Cost Basis', dashed: true, formatTooltip: v => fmtUSD(v) + ' invested' }]}
        /> : (historicalPriceLoading ? <div className="card"><div className="card-header"><div className="card-title">Portfolio Value vs Cost Basis</div><div style={{fontSize:'.8125rem',color:'var(--text-secondary)',fontFamily:'JetBrains Mono'}}>Loading…</div></div></div> : null),
        dca: () => _dca.length > 0 ? <SVGChart sampleData={S}
          data={_dca} dataKey="buyUsd" title="DCA Tracker"
          subtitle={fmtUSD(_dca.reduce((s,d)=>s+d.buyUsd,0))+' total invested'}
          scopeLabel={filteredScopeLabel}
          color="#10b981" chartType="bar" formatY={fmtCompactUSD}
          formatTooltip={v => '$'+Math.round(v).toLocaleString()+' bought'}
        /> : (hasWalletFilter ? renderFilteredEmptyCard('DCA Tracker') : null),
        pl: () => _pl.length > 1 ? <SVGChart sampleData={S}
          data={_pl} dataKey="totalPL" title="Realized vs Unrealized P&L"
          subtitle={(_pl[_pl.length-1]?.totalPL>=0?'+':'')+fmtUSD(_pl[_pl.length-1]?.totalPL||0)+' total P&L'}
          scopeLabel={globalScopeLabel}
          color={_pl[_pl.length-1]?.totalPL>=0 ? '#16a34a' : '#dc2626'}
          formatY={v => { const sign=v>0?'+':v<0?'-':''; const abs=Math.abs(v); if(abs>=1000000) return sign+'$'+(abs/1000000).toFixed(1).replace(/\.0$/,'')+'M'; if(abs>=1000) return sign+'$'+Math.round(abs/1000)+'k'; if(abs>=1) return sign+'$'+Math.round(abs); return '$0'; }}
          formatTooltip={v => (v>=0?'+':'-')+'$'+Math.round(Math.abs(v)).toLocaleString()}
          refLine={0} refLineColor="var(--text-tertiary)" refLineLabel="Break even"
        /> : null,
        waterfall: () => (_waterfall.buys > 0 || _waterfall.rewards > 0 || _waterfall.sells > 0 || _waterfall.fees > 0 || _waterfall.startBTC > 0) ? <WaterfallChart data={_waterfall} btcPrice={btcPrice} sampleData={S} scopeLabel={globalScopeLabel} /> : null,
        feeBurn: () => _fees.length > 0 ? <SVGChart sampleData={S}
          data={_fees} dataKey="fees" title="Cumulative Fee Burn"
          subtitle={_fees[_fees.length-1]?.fees.toFixed(8)+' BTC in fees'}
          scopeLabel={filteredScopeLabel}
          color="#ef4444" formatY={v=>v.toFixed(4)} formatTooltip={v => v.toFixed(8)+' BTC lost to fees'} fillGradient={true}
        /> : (hasWalletFilter ? renderFilteredEmptyCard('Cumulative Fee Burn') : null),
        rewards: () => _rewards.length > 0 ? <SVGChart sampleData={S}
          data={_rewards} dataKey="rewards" title="Reward Income"
          subtitle={_rewards[_rewards.length-1]?.rewards.toFixed(8)+' BTC earned'}
          scopeLabel={filteredScopeLabel}
          color="#8b5cf6" formatY={v=>v.toFixed(4)}
          formatTooltip={v => { const usd = btcPrice ? ' · $'+Math.round(v*btcPrice).toLocaleString() : ''; return v.toFixed(8)+' BTC'+usd; }}
          fillGradient={true}
        /> : (hasWalletFilter ? renderFilteredEmptyCard('Reward Income') : null),
        monthly: () => _monthly.length > 0 ? <SVGChart sampleData={S}
          data={_monthly} dataKey="buys" title="Monthly Summary"
          subtitle={_monthly.length+' months of activity'}
          scopeLabel={filteredScopeLabel}
          color="#0ea5e9" chartType="bar" formatY={fmtCompactUSD}
          formatTooltip={v => '$'+Math.round(v).toLocaleString()+' bought'}
        /> : (hasWalletFilter ? renderFilteredEmptyCard('Monthly Summary') : null),
        movingAvg: () => _movingAvg.length > 0 ? <SVGChart sampleData={isSample && !hasLiveMovingAvg ? S : undefined}
          data={_movingAvg} dataKey="price" title="BTC Price & Moving Averages"
          subtitle={fmtUSD(_movingAvg[_movingAvg.length-1]?.price||0)+' current'}
          scopeLabel={globalScopeLabel}
          color="#f7931a" formatY={fmtCompactUSD} formatTooltip={v => '$'+Math.round(v).toLocaleString()} publicData
          overlay={(() => {
            if((effectiveMaLines.rsi14===false) || !_movingAvg.some(d=>d.rsi14!=null)) return undefined;
            const rsiData = _movingAvg.filter(d=>d.rsi14!=null);
            const latestRsi = rsiData[rsiData.length-1]?.rsi14 ?? null;
            const activeRefLines = [
              ...(rsiThresholds.overbought != null ? [{ value: rsiThresholds.overbought, color: RSI_ZONE_COLORS.overbought, label: 'RSI Overbought' }] : []),
              ...(rsiThresholds.oversold != null ? [{ value: rsiThresholds.oversold, color: RSI_ZONE_COLORS.oversold, label: 'RSI Oversold' }] : []),
            ];
            return {
              data: rsiData,
              dataKey: 'rsi14',
              color: getRsiColor(latestRsi, rsiThresholds),
              formatY: v => Math.round(v),
              formatTooltip: v => 'RSI: '+v.toFixed(1),
              label: 'RSI (14)',
              getValueColor: v => getRsiColor(v, rsiThresholds),
              getLegendColor: () => getRsiColor(latestRsi, rsiThresholds),
              refLines: activeRefLines,
            };
          })()}
          lines={[
            ...((effectiveMaLines.ma50d!==false) && _movingAvg.some(d=>d.ma50d!=null) ? [{ dataKey:'ma50d', color:'#ef4444', label:'50D MA', dashed:false, formatTooltip:v=>'50D: $'+Math.round(v).toLocaleString() }] : []),
            ...((effectiveMaLines.ma200d!==false) && _movingAvg.some(d=>d.ma200d!=null) ? [{ dataKey:'ma200d', color:'#a855f7', label:'200D MA', dashed:false, formatTooltip:v=>'200D: $'+Math.round(v).toLocaleString() }] : []),
            ...((effectiveMaLines.ma200w!==false) && _movingAvg.some(d=>d.ma200w!=null) ? [{ dataKey:'ma200w', color:'#06b6d4', label:'200W MA', dashed:false, formatTooltip:v=>'200W: $'+Math.round(v).toLocaleString() }] : []),
          ]}
        /> : null,
      };
      const order = settings.chartOrder || DEFAULT_CHART_ORDER;
      const reconciledOrder = [...order.filter(k => DEFAULT_CHART_ORDER.includes(k)), ...DEFAULT_CHART_ORDER.filter(k => !order.includes(k))];
      return (
        <div className="charts-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:'1rem'}}>
          {reconciledOrder.map(key => !effectiveHiddenCharts[key] && chartRenderers[key] ? <React.Fragment key={key}>{chartRenderers[key]()}</React.Fragment> : null)}
        </div>
      );
    })()}
    </>
  );
}

function WaterfallChart({ data, btcPrice, sampleData, scopeLabel }) {
  const [hover, setHover] = React.useState(null);
  const [mouse, setMouse] = React.useState({x:0,y:0});
  const [expanded, setExpanded] = React.useState(false);
  const handleMove = useThrottledCallback((e) => setMouse({x:e.clientX,y:e.clientY}), 32);
  const { startBTC, buys, rewards, sells, fees, endBTC } = data;
  const bars = [
    { key:'start', label:'Start', value: startBTC, color:'#6b7280', isTotal: true },
    { key:'buys', label:'Buys', value: buys, color:'#16a34a', direction: 1 },
    { key:'rewards', label:'Rewards', value: rewards, color:'#8b5cf6', direction: 1 },
    { key:'sells', label:'Sells', value: sells, color:'#dc2626', direction: -1 },
    { key:'fees', label:'Fees', value: fees, color:'#ef4444', direction: -1 },
    { key:'end', label:'End', value: endBTC, color:'#f7931a', isTotal: true },
  ];
  let running = startBTC;
  const positioned = bars.map(bar => {
    if(bar.isTotal) {
      const r = { ...bar, bottom: 0, top: bar.value };
      if(bar.key === 'end') running = endBTC;
      return r;
    }
    const bottom = bar.direction > 0 ? running : running - bar.value;
    const top = bar.direction > 0 ? running + bar.value : running;
    running = bar.direction > 0 ? running + bar.value : running - bar.value;
    return { ...bar, bottom, top };
  });
  const maxVal = Math.max(...positioned.map(b => b.top), 0.00000001);
  const netChange = endBTC - startBTC;
  const netPct = startBTC > 0.00000001 ? ((netChange / startBTC) * 100).toFixed(1) : '—';
  const subtitle = (netChange >= 0 ? '+' : '') + netChange.toFixed(8) + ' BTC (' + (netChange >= 0 ? '+' : '') + netPct + '%)';
  const niceStep = (range, count) => { if(!range||range<=0) return 0.01; const rough=range/count; const mag=Math.pow(10,Math.floor(Math.log10(rough))); const norm=rough/mag; const nice=norm<=1.5?1:norm<=3?2:norm<=7?5:10; return nice*mag; };

  const renderSVG = (isExp) => {
    const W = isExp?960:480, H = isExp?400:180, PL = isExp?64:58, PR = isExp?20:16, PT = isExp?12:8, PB = isExp?36:32;
    const iW = W-PL-PR, iH = H-PT-PB;
    const barCount = positioned.length;
    const gap = iW * 0.08 / (barCount - 1 || 1);
    const barW = (iW - gap * (barCount - 1)) / barCount;
    const yScale = v => PT + iH - (v / maxVal) * iH;
    const step = niceStep(maxVal, isExp?8:4);
    const ticks = [];
    for(let v = 0; v <= maxVal + step * 0.01 && ticks.length < (isExp?16:12); v += step) ticks.push(+v.toPrecision(10));
    const fontSize = isExp ? 11 : 9;
    const valFontSize = isExp ? 10 : 8;
    const rx = isExp ? 4 : 3;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}
        onMouseLeave={() => setHover(null)}>
        {ticks.map(v => (
          <React.Fragment key={v}>
            <line x1={PL} x2={W-PR} y1={yScale(v)} y2={yScale(v)} stroke="var(--border-color)" strokeWidth="0.5" strokeDasharray="3,3"/>
            <text x={PL-6} y={yScale(v)+3} textAnchor="end" fontSize={fontSize} fill="var(--text-tertiary)" fontFamily="JetBrains Mono">{v.toFixed(v>=0.01?2:4)}</text>
          </React.Fragment>
        ))}
        {positioned.map((bar, i) => {
          const x = PL + i * (barW + gap);
          const yTop = yScale(bar.top);
          const yBot = yScale(bar.bottom);
          const barH = Math.max(yBot - yTop, 1);
          return (
            <React.Fragment key={bar.key}>
              <rect x={x} y={yTop} width={barW} height={barH} rx={rx} fill={bar.color} opacity={hover===i?1:0.85}
                onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{cursor:'default'}}/>
              {i < positioned.length - 1 && (
                <line x1={x + barW} x2={x + barW + gap} y1={yScale(bar.isTotal ? bar.top : (bar.direction > 0 ? bar.top : bar.bottom))} y2={yScale(bar.isTotal ? bar.top : (bar.direction > 0 ? bar.top : bar.bottom))}
                  stroke="var(--text-tertiary)" strokeWidth="1" strokeDasharray="3,2" opacity="0.5"/>
              )}
              <text x={x + barW/2} y={H - PB + (isExp?18:14)} textAnchor="middle" fontSize={fontSize} fill="var(--text-secondary)" fontFamily="JetBrains Mono">{bar.label}</text>
              <text x={x + barW/2} y={yTop - (isExp?6:4)} textAnchor="middle" fontSize={valFontSize} fill="var(--text-tertiary)" fontFamily="JetBrains Mono">
                {bar.isTotal ? bar.value.toFixed(isExp?8:4) : (bar.direction > 0 ? '+' : '-') + bar.value.toFixed(isExp?8:4)}
              </text>
            </React.Fragment>
          );
        })}
      </svg>
    );
  };

  const renderTooltip = () => hover !== null ? (
    <div style={{position:'fixed',left:mouse.x+12,top:mouse.y-10,background:'var(--bg-primary)',border:'1px solid var(--border-color)',borderRadius:8,padding:'.375rem .625rem',fontSize:'.75rem',fontFamily:'JetBrains Mono',pointerEvents:'none',zIndex:9999,boxShadow:'0 4px 12px rgba(0,0,0,.15)'}}>
      <div style={{fontWeight:600,color:positioned[hover].color}}>{positioned[hover].label}</div>
      <div style={{color:'var(--text-primary)'}}>{positioned[hover].value.toFixed(8)} BTC</div>
      {btcPrice > 0 && <div style={{color:'var(--text-secondary)'}}>${Math.round(positioned[hover].value * btcPrice).toLocaleString()}</div>}
    </div>
  ) : null;

  return (
    <div className="card">
      <div className="card-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
            <div className="card-title">BTC Flow Waterfall</div>
            {scopeLabel && <span className="scope-badge">{scopeLabel}</span>}
            {sampleData && <span style={{fontSize:'.625rem',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',background:'var(--bg-tertiary)',color:'var(--text-tertiary)',border:'1px solid var(--border-color)',borderRadius:'4px',padding:'.125rem .375rem',whiteSpace:'nowrap'}}>Sample</span>}
          </div>
          <div style={{fontSize:'.8125rem',color:netChange>=0?'#16a34a':'#dc2626',fontFamily:'JetBrains Mono'}}>{subtitle}</div>
        </div>
        {!sampleData && <button onClick={()=>{setHover(null);setExpanded(true);}} title="Expand chart"
          style={{background:'none',border:'none',cursor:'pointer',padding:'6px',color:'var(--text-tertiary)',flexShrink:0,marginTop:'2px'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>}
      </div>
      <div className="card-body" style={{paddingTop:'.25rem',paddingBottom:'.5rem'}} onMouseMove={handleMove}>
        {renderSVG(false)}
        {!expanded && renderTooltip()}
      </div>
      {expanded && ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)'}}
          onClick={e=>{if(e.target===e.currentTarget){setExpanded(false);setHover(null);}}}>
          <div style={{background:'var(--bg-primary)',borderRadius:'16px',width:'calc(100vw - 2rem)',maxWidth:'960px',maxHeight:'calc(100vh - 2rem)',overflow:'auto',boxShadow:'0 25px 50px rgba(0,0,0,.25)'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'1.25rem 1.5rem .5rem'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
                  <div style={{fontSize:'1.125rem',fontWeight:700,color:'var(--text-primary)'}}>BTC Flow Waterfall</div>
                  {scopeLabel && <span className="scope-badge">{scopeLabel}</span>}
                </div>
                <div style={{fontSize:'.875rem',color:netChange>=0?'#16a34a':'#dc2626',fontFamily:'JetBrains Mono'}}>{subtitle}</div>
              </div>
              <button onClick={()=>{setExpanded(false);setHover(null);}} title="Close"
                style={{background:'none',border:'none',cursor:'pointer',padding:'4px',color:'var(--text-secondary)',fontSize:'1.25rem',lineHeight:1}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <div style={{padding:'0 1.5rem 1.25rem'}} onMouseMove={handleMove}>
              {renderSVG(true)}
              {renderTooltip()}
            </div>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

function PieChart({ segments, totalBTC, btcPrice }) {
  const [hover, setHover] = React.useState(null);
  const [mouse, setMouse] = React.useState({x:0,y:0});
  const R = 90, SIZE = R * 2 + 4, CENTER = SIZE / 2;
  const handleMove = useThrottledCallback((e) => setMouse({x:e.clientX,y:e.clientY}), 32);
  // Build pie wedge paths
  let angle = -Math.PI / 2;
  const wedges = segments.map((seg, i) => {
    const sweep = seg.pct * 2 * Math.PI;
    const x1 = CENTER + R * Math.cos(angle);
    const y1 = CENTER + R * Math.sin(angle);
    const x2 = CENTER + R * Math.cos(angle + sweep);
    const y2 = CENTER + R * Math.sin(angle + sweep);
    const largeArc = sweep > Math.PI ? 1 : 0;
    const d = `M${CENTER},${CENTER} L${x1},${y1} A${R},${R} 0 ${largeArc} 1 ${x2},${y2} Z`;
    angle += sweep;
    return { ...seg, d, idx: i };
  });
  return (
    <div className="donut-chart-container" onMouseMove={handleMove}>
      <div className="donut-chart-wrap" style={{width:SIZE,height:SIZE}}>
        <svg viewBox={`0 0 ${SIZE} ${SIZE}`} width={SIZE} height={SIZE}>
          {wedges.map((w,i) => (
            <path key={w.name} d={w.d} fill={w.color}
              className="donut-segment"
              style={{opacity:hover!==null&&hover!==i?.4:1}}
              onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
            />
          ))}
        </svg>
      </div>
      <div className="donut-legend">
        {segments.map((seg,i) => (
          <div key={seg.name} className="donut-legend-item"
            onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
            style={{fontWeight:hover===i?600:'normal'}}>
            <span className="donut-legend-dot" style={{background:seg.color}} />
            {seg.name}
          </div>
        ))}
      </div>
      <div className="pie-total" style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:'1rem',color:'var(--bitcoin-orange)'}}>
        {fmtBTC(totalBTC)} BTC
      </div>
      {hover !== null && segments[hover] && ReactDOM.createPortal(
        <div className="donut-tooltip" style={{left:mouse.x+12,top:mouse.y-10}}>
          <div className="dt-name">{segments[hover].name}</div>
          <div className="dt-type">{segments[hover].type}</div>
          <div className="dt-row"><span className="dt-label">BTC</span><span className="dt-value">{fmtBTC(segments[hover].amount)}</span></div>
          {btcPrice && <div className="dt-row"><span className="dt-label">USD</span><span className="dt-value">{fmtUSD(segments[hover].amount*btcPrice)}</span></div>}
          <div className="dt-row"><span className="dt-label">Share</span><span className="dt-value dt-pct">{(segments[hover].pct*100).toFixed(1)}%</span></div>
        </div>,
        document.body
      )}
    </div>
  );
}

  const [pos, setPos] = React.useState('bottom');
  React.useEffect(() => {
    if(show && ref.current && !position) {
      const r = ref.current.getBoundingClientRect();

      {show && <div style={{
        position:'absolute',left:'50%',transform:'translateX(-50%)',
