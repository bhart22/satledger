              };
              const maLineDefs = [
                { key:'ma50d', label:'50-Day MA', color:'#ef4444' },
                { key:'ma200d', label:'200-Day MA', color:'#a855f7' },
                { key:'ma200w', label:'200-Week MA', color:'#06b6d4' },
                { key:'rsi14', label:'RSI (14)', color:'#ec4899' },
              ];
              return (
                <div className="card">
                  <div className="card-header">
                    <div className="card-title">Dashboard Charts</div>
                  </div>
                  <div className="card-body">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
                      <div style={{fontSize:'.8125rem',color:'var(--text-secondary)'}}>Toggle visibility and reorder your dashboard charts.</div>
                      <button className="btn btn-secondary btn-sm" style={{fontSize:'.75rem',whiteSpace:'nowrap'}} onClick={() => updateSettings({ chartOrder: DEFAULT_CHART_ORDER, hiddenCharts: {}, maLines: {} })}>Reset to default</button>
                    </div>
                    {orderedCharts.map((chart, i) => (
                      <React.Fragment key={chart.key}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem',...(i>0?{borderTop:'1px solid var(--border-color)',marginTop:'.625rem',paddingTop:'.625rem'}:{})}}>
                          <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:'.375rem'}}>
                            <div style={{fontSize:'.875rem',fontWeight:600}}>{chart.label}</div>
                            <InfoTip text={chart.desc} />
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'.125rem',flexShrink:0}}>
                            <button onClick={()=>moveChart(chart.key,-1)} disabled={i===0} title="Move up"
                              style={{background:'none',border:'none',cursor:i===0?'default':'pointer',padding:'6px',color:i===0?'var(--border-color)':'var(--text-tertiary)',lineHeight:0}}>
                              {Icon.ChevronUp({width:16,height:16})}
                            </button>
                            <button onClick={()=>moveChart(chart.key,1)} disabled={i===orderedCharts.length-1} title="Move down"
                              style={{background:'none',border:'none',cursor:i===orderedCharts.length-1?'default':'pointer',padding:'6px',color:i===orderedCharts.length-1?'var(--border-color)':'var(--text-tertiary)',lineHeight:0}}>
                              {Icon.ChevronDown({width:16,height:16})}
                            </button>
                          </div>
                          <label className="theme-switch" style={{flexShrink:0}}>
                            <input type="checkbox" checked={!effectiveHiddenCharts[chart.key]} onChange={e=>{
                              const hc = {...(settings.hiddenCharts||{})};
                              hc[chart.key] = e.target.checked ? false : true;
                              updateSettings({hiddenCharts:hc});
                            }} />
                            <span className="theme-slider"></span>
                          </label>
                        </div>
                        {chart.key === 'movingAvg' && !effectiveHiddenCharts.movingAvg && (
                          <div style={{marginLeft:'1.25rem',paddingLeft:'.75rem',borderLeft:'2px solid var(--border-color)',marginTop:'.5rem'}}>
                            {maLineDefs.map((ma, mi) => (
                              <div key={ma.key} style={{...(mi>0?{borderTop:'1px solid var(--border-color)',marginTop:'.5rem',paddingTop:'.5rem'}:{})}}>
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem'}}>
                                  <div style={{display:'flex',alignItems:'center',gap:'.375rem'}}>
                                    <span style={{width:8,height:8,borderRadius:'50%',background:ma.color,flexShrink:0}}/>
                                    <span style={{fontSize:'.8125rem',fontWeight:500}}>{ma.label}</span>
                                  </div>
                                  <label className="theme-switch" style={{flexShrink:0}}>
                                    <input type="checkbox" checked={effectiveMaLines[ma.key]!==false} onChange={e=>{
                                      const ml = {...(settings.maLines||{})};
                                      ml[ma.key] = e.target.checked ? true : false;
                                      updateSettings({maLines:ml});
                                    }} />
                                    <span className="theme-slider"></span>
                                  </label>
                                </div>
                                {ma.key === 'rsi14' && (
                                  <div style={{marginTop:'.625rem',padding:'.75rem',border:'1px solid var(--border-color)',borderRadius:'10px',background:'var(--bg-tertiary)'}}>
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'.75rem'}}>
                                      <label style={{display:'flex',flexDirection:'column',gap:'.375rem'}}>
                                        <span style={{fontSize:'.75rem',fontWeight:600,color:'var(--text-secondary)',textTransform:'uppercase',letterSpacing:'.04em'}}>Overbought</span>
                                        <input
                                          className="form-input"
                                          type="number"
                                          min="0"
                                          max="100"
                                          step="1"
                                          value={rsiThresholdDraft.overbought}
                                          onChange={e=>handleRsiThresholdDraftChange('overbought', e.target.value)}
                                          aria-label="RSI overbought threshold"
                                          style={rsiThresholdError ? {borderColor:'var(--red)'} : undefined}
                                        />
                                      </label>
                                      <label style={{display:'flex',flexDirection:'column',gap:'.375rem'}}>
                                        <span style={{fontSize:'.75rem',fontWeight:600,color:'var(--text-secondary)',textTransform:'uppercase',letterSpacing:'.04em'}}>Oversold</span>
                                        <input
                                          className="form-input"
                                          type="number"
                                          min="0"
                                          max="100"
                                          step="1"
                                          value={rsiThresholdDraft.oversold}
                                          onChange={e=>handleRsiThresholdDraftChange('oversold', e.target.value)}
                                          aria-label="RSI oversold threshold"
                                          style={rsiThresholdError ? {borderColor:'var(--red)'} : undefined}
                                        />
                                      </label>
                                    </div>
                                    <div style={{fontSize:'.75rem',color:'var(--text-secondary)',marginTop:'.625rem'}}>
                                      Leave a field blank or set it to <strong>0</strong> to disable that RSI threshold line. When enabled, values above <strong>{rsiThresholdDraft.overbought || 'the overbought threshold'}</strong> are overbought, and values below <strong>{rsiThresholdDraft.oversold || 'the oversold threshold'}</strong> are oversold.
                                    </div>
                                    {rsiThresholdError && (
                                      <div style={{fontSize:'.75rem',color:'var(--red)',marginTop:'.5rem',fontWeight:600}}>
                                        {rsiThresholdError}
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        )}
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* Dashboard Stat Cards — visibility */}
            <div className="card">
              <div className="card-header">
                <div className="card-title">Dashboard Stat Cards</div>
              </div>
              <div className="card-body">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
                  <div style={{fontSize:'.8125rem',color:'var(--text-secondary)'}}>Toggle visibility of the summary stat cards on the dashboard.</div>
                  <button className="btn btn-secondary btn-sm" style={{fontSize:'.75rem',whiteSpace:'nowrap'}} onClick={() => updateSettings({ hiddenStats: {} })}>Reset to default</button>
                </div>
                {STAT_CARD_DEFS.map((def, i) => (
                  <div key={def.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem',...(i>0?{borderTop:'1px solid var(--border-color)',marginTop:'.625rem',paddingTop:'.625rem'}:{})}}>
                    <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:'.375rem'}}>
                      <div style={{fontSize:'.875rem',fontWeight:600}}>{def.label}</div>
                      <InfoTip text={def.desc} />
                    </div>
                    <label className="theme-switch" style={{flexShrink:0}}>
                      <input type="checkbox" checked={!(settings.hiddenStats||{})[def.key]} onChange={e=>{
                        const hs = {...(settings.hiddenStats||{})};
                        hs[def.key] = e.target.checked ? false : true;
                        updateSettings({hiddenStats:hs});
                      }} />
                      <span className="theme-slider"></span>
                    </label>
                  </div>
                ))}
              </div>
            </div>

            {/* Data management */}
            <div className="card">
              <div className="card-header">
                <div className="card-title">Data Management</div>
              </div>
              <div className="card-body">

                {/* Import CSV */}
                <div style={{marginBottom:'1.5rem'}}>
                  <div style={{fontSize:'.9375rem',fontWeight:600,marginBottom:'.25rem'}}>Import Backup or Transactions</div>
                  <div style={{fontSize:'.8125rem',color:'var(--text-secondary)',marginBottom:'.75rem'}}>
                    Import a <strong>full backup JSON</strong> to restore transactions, wallets, settings, and the encrypted vault. Legacy Tracker CSV and CoinLedger CSV files are still supported for transaction import.
                  </div>
                  <label className="btn btn-secondary" style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'.375rem'}}>
                    {Icon.Upload({width:13,height:13})} Import File
                    <input type="file" accept=".csv,.json" onChange={importCSV} style={{display:'none'}}/>
                  </label>
                </div>


                {/* Delete all */}
                <div>
                  <div>
                    <div style={{fontSize:'.9375rem',fontWeight:600,marginBottom:'.25rem',color:'var(--red)'}}>Danger Zone</div>
                    <div style={{fontSize:'.8125rem',color:'var(--text-secondary)',marginBottom:'1rem'}}>
                      Reset your data. Export a Tracker Backup first if you want to restore later.
                    </div>
                    <button className="btn btn-danger" onClick={()=>setShowResetDialog(true)} style={{display:'inline-flex',alignItems:'center',gap:'.375rem'}}>
                      {Icon.Trash({width:13,height:13})} Reset Data…
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* About */}
            <div className="card">
              <div className="card-header"><div className="card-title">About</div></div>
              <div className="card-body">
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'1rem'}}>
                  {[
                    ['Transactions',transactions.length],
                    ['Wallets',wallets.length],
                    ['Storage', syncState === 'synced' ? 'Local + Google Drive' : syncState === 'syncing' ? 'Local + Google Drive (syncing)' : 'Local only'],
                    ['Date range', transactions.length ? (() => { const dates = transactions.map(t=>t.date).filter(Boolean); const min = dates.reduce((a,b) => a < b ? a : b); const max = dates.reduce((a,b) => a > b ? a : b); return `${fmtDate(min)} → ${fmtDate(max)}`; })() : '—'],
                    ['Last updated', new Date().toLocaleDateString()],
                  ].map(([label,val])=>(
                    <div key={label}>
                      <div style={{fontSize:'.75rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text-tertiary)',marginBottom:'.25rem'}}>{label}</div>
                      <div style={{fontSize:'.9375rem',fontWeight:500,fontFamily:typeof val==='number'?'JetBrains Mono':undefined}}>{val}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid var(--border-color)',fontSize:'.875rem',color:'var(--text-secondary)',display:'flex',flexWrap:'wrap',gap:'1rem'}}>
                  <div>Feedback: <a href="mailto:info@satledger.com" style={{color:'var(--bitcoin-orange)',fontWeight:600,textDecoration:'none'}}>info@satledger.com</a></div>
                  <div>GitHub: <a href="https://github.com/bhart22/satledger" target="_blank" rel="noreferrer" style={{color:'var(--bitcoin-orange)',fontWeight:600,textDecoration:'none'}}>github.com/bhart22/satledger</a></div>
                </div>
                <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid var(--border-color)',display:'flex',gap:'.625rem',flexWrap:'wrap'}}>
                  <a className="btn btn-secondary btn-sm" href="privacy.html" style={{textDecoration:'none'}}>
                    {Icon.FileText({width:13,height:13})} Privacy Policy
                  </a>
                  <a className="btn btn-secondary btn-sm" href="terms.html" style={{textDecoration:'none'}}>
                    {Icon.FileText({width:13,height:13})} Terms of Service
                  </a>
                </div>
              </div>
            </div>
          </div>
        )}
      </main>
      </div>{/* end app-body */}

      {/* ── Add/Edit Transaction Modal ── */}
      {showModal && (
        <div className="overlay" onClick={()=>{setShowModal(false);setEditIdx(null);}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{editIdx!==null?'Edit':'Add'} Transaction</div>
              <button className="btn-icon" onClick={()=>{setShowModal(false);setEditIdx(null);}}>{Icon.X()}</button>
            </div>
            <div>
              <div className="modal-body">
                <div className="form-grid">
                  <div className="form-group">
                    <label className="form-label">Date</label>
                    <input type="date" className="form-input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Type</label>
                    <select className="form-select" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                      <option>Buy</option><option>Sell</option><option>Transfer</option><option>Reward</option><option>Consolidation</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{form.type==='Transfer'?'From Wallet':'Wallet'}</label>
                    <input list="wallet-list" className="form-input" placeholder="e.g. Gemini" value={form.wallet} onChange={e=>setForm({...form,wallet:e.target.value})}/>
                    <datalist id="wallet-list">{wallets.map(w=><option key={w.id} value={w.name}/>)}</datalist>
                  </div>
                  {form.type==='Transfer' && (
                    <div className="form-group">
                      <label className="form-label">To Wallet</label>
                      <input list="wallet-list" className="form-input" placeholder="e.g. Bitkey" value={form.wallet2} onChange={e=>setForm({...form,wallet2:e.target.value})}/>
                    </div>
                  )}
                  <div className="form-group">
                    <label className="form-label">Amount (BTC)</label>
                    <input type="number" step="0.00000001" className="form-input" placeholder="0.00000000" value={form.amount} onChange={e=>{
                      const amt = e.target.value;
                      const price = parseFloat(form.price);
                      const newTotal = (amt && price) ? (parseFloat(amt)*price).toFixed(2) : form.totalUsd;
                      setForm({...form, amount:amt, totalUsd:newTotal});
                    }} required/>
                  </div>
                  {(form.type==='Buy'||form.type==='Sell') && (
                    <div className="form-group">
                      <label className="form-label">Price per BTC</label>
                      <div className="price-wrap">
                        <input type="number" step="0.01" className="form-input" placeholder={btcPrice?btcPrice.toFixed(2):"0.00"} value={form.price} onChange={e=>{
                          const p = e.target.value;
                          const amt = parseFloat(form.amount);
                          const newTotal = (p && amt) ? (parseFloat(p)*amt).toFixed(2) : '';
                          setForm({...form, price:p, totalUsd:newTotal});
                        }}/>
                        <button type="button" className="price-refresh" onClick={async()=>{
                          const p=await fetchPrice();
                          if(p) {
                            const amt = parseFloat(form.amount);
                            const newTotal = amt ? (p*amt).toFixed(2) : '';
                            setForm(f=>({...f, price:p.toFixed(2), totalUsd:newTotal}));
                          }
                        }} title="Use live price">{Icon.Refresh({width:13,height:13})}</button>
                      </div>
                    </div>
                  )}
                  {(form.type==='Buy'||form.type==='Sell') && (
                    <div className="form-group">
                      <label className="form-label">Total USD</label>
                      <input type="number" step="0.01" className="form-input" placeholder="0.00" value={form.totalUsd} onChange={e=>{
                        const usd = e.target.value;
                        const amt = parseFloat(form.amount);
                        const newPrice = (usd && amt) ? (parseFloat(usd)/amt).toFixed(2) : '';
                        setForm({...form, totalUsd:usd, price:newPrice});
                      }}/>
                    </div>
                  )}
                  <div className="form-group">
                    <label className="form-label">Fee {form.type==='Transfer'?'(BTC)':'(USD)'}</label>
                    <input type="number" step={form.type==='Transfer'?'0.00000001':'0.01'} className="form-input" placeholder="0" value={form.fee} onChange={e=>setForm({...form,fee:e.target.value})}/>
                  </div>
                  <div className="form-group full">
                    <label className="form-label">TxHash (optional)</label>
                    <input className="form-input" placeholder="On-chain transaction hash" value={form.txhash} onChange={e=>setForm({...form,txhash:e.target.value})} style={{fontFamily:'JetBrains Mono',fontSize:'.75rem'}}/>
                  </div>
                  <div className="form-group full">
                    <label className="form-label">Notes</label>
                    <input className="form-input" placeholder="Optional description" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
                  </div>
                  <div className="form-group full">
                    <label style={{display:'flex',alignItems:'center',gap:'.5rem',fontSize:'.8125rem',color:'var(--text-secondary)',cursor:'pointer'}}>
                      <input type="checkbox" checked={form.excludeStats||false} onChange={e=>setForm({...form,excludeStats:e.target.checked})} style={{accentColor:'var(--bitcoin-orange)'}}/>
                      Exclude from cost basis & P&L
                    </label>
                  </div>
                </div>
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-secondary" onClick={()=>{setShowModal(false);setEditIdx(null);}}>Cancel</button>
                <button type="button" className="btn btn-primary" onClick={handleSubmit}>{editIdx!==null?'Update':'Add'} Transaction</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Add/Edit Wallet Modal ── */}
      {showWalletModal && (
        <div className="overlay" onClick={()=>setShowWalletModal(false)}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{editWalletIdx!==null?'Edit':'Add'} Wallet</div>
              <button className="btn-icon" onClick={()=>setShowWalletModal(false)}>{Icon.X()}</button>
            </div>
            <div>
              <div className="modal-body">
                <div className="form-group" style={{marginBottom:'1rem'}}>
                  <label className="form-label">Name</label>
                  <input className="form-input" placeholder="e.g. Bitkey Cold Storage" value={walletForm.name} onChange={e=>setWalletForm({...walletForm,name:e.target.value})} required/>
                </div>
                <div className="form-group" style={{marginBottom:'1rem'}}>
                  <label className="form-label">Type</label>
                  <select className="form-select" value={walletForm.type} onChange={e=>setWalletForm({...walletForm,type:e.target.value})}>
                    <option>Exchange</option><option>Wallet</option><option>Cold Storage</option><option>Other</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Bitcoin Address (optional)</label>
                  <input className="form-input" placeholder="bc1q…" value={walletForm.address} onChange={e=>setWalletForm({...walletForm,address:e.target.value})} style={{fontFamily:'JetBrains Mono',fontSize:'.75rem'}}/>
                </div>
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-secondary" onClick={()=>setShowWalletModal(false)}>Cancel</button>
                <button type="button" className="btn btn-primary" onClick={handleWalletSubmit}>{editWalletIdx!==null?'Update':'Add'} Wallet</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── IMPORT PREVIEW ── */}
      {importPreview && (
        <div className="overlay" onClick={()=>setImportPreview(null)}>
          <div className="modal" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">Import Preview</div>
              <button className="btn-icon" onClick={()=>setImportPreview(null)}>{Icon.X()}</button>
            </div>
            <div className="modal-body">
              <div style={{display:'flex',gap:'1rem',flexWrap:'wrap',marginBottom:'1rem'}}>
                <div style={{flex:1,minWidth:120,padding:'.75rem',borderRadius:8,background:'var(--bg-tertiary)',border:'1px solid var(--border-color)'}}>
                  <div style={{fontSize:'.6875rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text-secondary)',marginBottom:'.25rem'}}>New Transactions</div>
                  <div style={{fontSize:'1.25rem',fontWeight:700,color:'var(--green)'}}>{importPreview.rows.length}</div>
                </div>
                {importPreview.dupeCount > 0 && (
                  <div style={{flex:1,minWidth:120,padding:'.75rem',borderRadius:8,background:'var(--bg-tertiary)',border:'1px solid var(--border-color)'}}>
                    <div style={{fontSize:'.6875rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text-secondary)',marginBottom:'.25rem'}}>Duplicates Skipped</div>
                    <div style={{fontSize:'1.25rem',fontWeight:700,color:'var(--text-tertiary)'}}>{importPreview.dupeCount}</div>
                  </div>
                )}
                <div style={{flex:1,minWidth:120,padding:'.75rem',borderRadius:8,background:'var(--bg-tertiary)',border:'1px solid var(--border-color)'}}>
                  <div style={{fontSize:'.6875rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text-secondary)',marginBottom:'.25rem'}}>Format</div>
                  <div style={{fontSize:'1.25rem',fontWeight:700}}>{importPreview.format}</div>
                </div>
              </div>
              <div style={{fontSize:'.75rem',fontWeight:600,color:'var(--text-secondary)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.5rem'}}>Transaction Summary</div>
              <div className="table-wrap" style={{maxHeight:300,overflowY:'auto',border:'1px solid var(--border-color)',borderRadius:8}}>
                <table>
                  <thead><tr><th>Date</th><th>Type</th><th>Wallet</th><th>Amount</th><th>Price</th></tr></thead>
                  <tbody>
                    {importPreview.rows.slice(0, 50).map((tx, i) => (
                      <tr key={i}>
                        <td style={{whiteSpace:'nowrap',fontSize:'.8125rem'}}>{fmtDate(tx.date)}</td>
                        <td><span className={`badge badge-${tx.type==='Consolidation'?'consolidation':tx.type.toLowerCase()}`}>{tx.type}</span></td>
                        <td style={{fontSize:'.8125rem'}}>{tx.wallet||'—'}</td>
                        <td className="mono" style={{fontSize:'.8125rem'}}>{fmtBTC(tx.amount)}</td>
                        <td className="mono" style={{fontSize:'.8125rem'}}>{tx.price && parseFloat(tx.price)>0 ? fmtUSD(tx.price) : '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {importPreview.rows.length > 50 && (
                  <div style={{padding:'.5rem 1rem',fontSize:'.75rem',color:'var(--text-tertiary)',textAlign:'center',borderTop:'1px solid var(--border-color)'}}>
                    Showing first 50 of {importPreview.rows.length} transactions
                  </div>
                )}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setImportPreview(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={()=>{
                const merged=[...transactions,...importPreview.rows];
                setTransactions(merged);
                save(merged, wallets);
                showToast(`Imported ${importPreview.rows.length} transactions${importPreview.dupeCount ? ` (${importPreview.dupeCount} duplicates skipped)` : ''}`);
                setImportPreview(null);
              }}>{Icon.Check({width:14,height:14})} Import {importPreview.rows.length} Transactions</button>
            </div>
          </div>
        </div>
      )}

      {/* ── TRANSFER WIZARD ── */}
      {showWizard && <TransferWizard
        transactions={transactions}
        wallets={wallets}
        wizardStep={wizardStep}
        setWizardStep={setWizardStep}
        wizardEdits={wizardEdits}
        setWizardEdits={setWizardEdits}
        setShowWizard={setShowWizard}
        setTransactions={setTransactions}
        save={save}
        showToast={showToast}
      />}


      {/* ── Reset Data Dialog ── */}
      {showResetDialog && <ResetDialog
        transactions={transactions}
        wallets={wallets}
        hasVault={!!vault}
        onClose={()=>setShowResetDialog(false)}
        onReset={(keepWallets) => {
          localStorage.removeItem('btc-tx-v2');

function WizardWalletSelect({ label, value, wallets, onChange }) {
  const [custom, setCustom] = React.useState(false);
  const isKnown = wallets.some(w => w.name === value);

  // If value is set but not in list, show custom input
  React.useEffect(() => {
    if(value && !wallets.some(w => w.name === value)) setCustom(true);
  }, []);

  return (
    <div>
      <div className="wizard-field-label">{label}</div>
      {!custom ? (
        <select
          className="form-select"
          style={{width:'100%'}}
          value={value}
          onChange={ev => {
            if(ev.target.value === '__custom__') { setCustom(true); onChange(''); }
            else onChange(ev.target.value);
          }}
        >
          <option value="">— Select wallet —</option>
          {wallets.map(w => <option key={w.id} value={w.name}>{w.name}</option>)}
          <option value="__custom__">Other (type manually)...</option>
        </select>
      ) : (
        <div style={{display:'flex',gap:'.375rem'}}>
          <input
            className="form-input"
            style={{flex:1}}
            placeholder="Type wallet name"
            autoFocus
            value={value}
            onChange={ev => onChange(ev.target.value)}

            type="button"

        </div>
      )}
      {!value && <div className="wizard-missing">{Icon.Warning({width:12,height:12})} Required</div>}
    </div>
  );
}


function TransferWizard({ transactions, wallets, wizardStep, setWizardStep, wizardEdits, setWizardEdits, setShowWizard, setTransactions, save, showToast }) {
  const incomplete = transactions
    .map((t,i)=>({...t,_idx:i}))
    .filter(t=>t.type==='Transfer'&&(!t.wallet||!t.wallet2)); // Consolidation excluded — same-wallet fee tx
  const total = incomplete.length;
  const isIntro = wizardStep===0;
  const isSummary = wizardStep===total+1;
  const currentTx = (!isIntro&&!isSummary) ? incomplete[wizardStep-1] : null;
  const edit = currentTx ? (wizardEdits[currentTx._idx]||{wallet:currentTx.wallet||'',wallet2:currentTx.wallet2||'',skip:false}) : null;

  const setEdit = (field, val) => {
    if(!currentTx) return;
    const existing = wizardEdits[currentTx._idx] || {wallet:currentTx.wallet||'', wallet2:currentTx.wallet2||'', skip:false};
    setWizardEdits(prev => ({...prev, [currentTx._idx]: {...existing, [field]: val}}));
  };

  const saveCurrentAndNext = () => {
    // Save the current tx immediately if it has both wallets set
    if(currentTx && edit && !edit.skip && edit.wallet && edit.wallet2) {
      const updated = [...transactions];
      updated[currentTx._idx] = {...updated[currentTx._idx], wallet: edit.wallet, wallet2: edit.wallet2};
      setTransactions(updated);
      save(updated, wallets);
    }
    setWizardStep(s => s+1);
  };

  const applyAll = () => {
    // Apply any remaining unapplied edits (e.g. ones revisited via Back)
    let updated = [...transactions];
    Object.entries(wizardEdits).forEach(([idxStr,e]) => {
      if(e.skip) return;
      const i = parseInt(idxStr);
      updated[i] = {...updated[i], wallet: e.wallet||updated[i].wallet, wallet2: e.wallet2||updated[i].wallet2};
    });
    setTransactions(updated);
    save(updated, wallets);
    setShowWizard(false);
    showToast('All transfers saved');
  };

  // Keyboard navigation — use refs to avoid stale closures
  const handlerRef = React.useRef();
  handlerRef.current = { isIntro, isSummary, wizardStep, applyAll, saveCurrentAndNext };
  React.useEffect(() => {
    const handler = (e) => {
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      const { isIntro, isSummary, wizardStep, applyAll, saveCurrentAndNext } = handlerRef.current;
      if(e.key === 'ArrowRight' || e.key === 'Enter') {
        e.preventDefault();
        if(isSummary) applyAll();
        else if(isIntro) setWizardStep(s => s+1);
        else saveCurrentAndNext();
      } else if(e.key === 'ArrowLeft' && wizardStep > 0) {
        e.preventDefault();
        setWizardStep(s => s-1);
      } else if(e.key === 'Escape') {
        e.preventDefault();
        setShowWizard(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const doneCount = Object.values(wizardEdits).filter(e=>!e.skip&&e.wallet&&e.wallet2).length;
  const skipCount = Object.values(wizardEdits).filter(e=>e.skip).length;

  return (
          <div className="wizard-overlay" onClick={()=>setShowWizard(false)}>
            <div className="wizard" onClick={e=>e.stopPropagation()}>

              {/* Header */}
              <div className="wizard-header">
                <div className="wizard-progress">
                  {[...Array(total+2)].map((_,i)=>(
                    <div key={i} className={`wizard-step-dot ${i<wizardStep?'done':i===wizardStep?'active':''}`}/>
                  ))}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div className="wizard-title">
                      {isIntro ? 'Transfer Wallet Wizard' : isSummary ? 'Review & Apply' : `Transfer ${wizardStep} of ${total}`}
                    </div>
                    <div className="wizard-subtitle">
                      {isIntro ? `${total} transfer${total!==1?'s':''} need wallet assignments` :
                       isSummary ? `${doneCount} fixed · ${skipCount} skipped · ${total-doneCount-skipCount} remaining` :
                       fmtDate(currentTx?.date)+' · '+parseFloat(currentTx?.amount||0).toFixed(8)+' BTC'}
                    </div>
                  </div>
                  <button className="btn-icon" onClick={()=>setShowWizard(false)}>{Icon.X()}</button>
                </div>
              </div>

              {/* Body */}
              <div className="wizard-body">

                {/* INTRO STEP */}
                {isIntro && (
                  <div>
                    <div style={{textAlign:'center',padding:'1rem 0 1.5rem'}}>
                      <div style={{fontSize:'3rem',marginBottom:'1rem'}}>↔️</div>
                      <div style={{fontSize:'1rem',fontWeight:600,marginBottom:'.5rem'}}>Assign wallets to your transfers</div>
                      <div style={{fontSize:'.875rem',color:'var(--text-secondary)',maxWidth:400,margin:'0 auto',lineHeight:1.7}}>
                        Each transfer needs a <strong>From</strong> and <strong>To</strong> wallet to track where your BTC moved. We'll walk through each one so you can assign or skip.
                      </div>
                    </div>
                    <div style={{background:'var(--bg-tertiary)',borderRadius:10,padding:'1rem 1.25rem'}}>
                      {incomplete.slice(0,5).map((tx,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.375rem 0',borderBottom:i<Math.min(incomplete.length,5)-1?'1px solid var(--border-color)':'none',fontSize:'.8125rem'}}>
                          <span style={{color:'var(--text-secondary)'}}>{fmtDate(tx.date)}</span>
                          <span style={{fontFamily:'JetBrains Mono',color:'var(--bitcoin-orange)',fontWeight:600}}>{parseFloat(tx.amount||0).toFixed(8)} BTC</span>
                          <span style={{color:'#d97706',fontSize:'.75rem',fontWeight:600}}>
                            {!tx.wallet&&!tx.wallet2?'Missing both':!tx.wallet?'Missing From':'Missing To'}
                          </span>
                        </div>
                      ))}
                      {incomplete.length>5 && <div style={{fontSize:'.75rem',color:'var(--text-tertiary)',textAlign:'center',paddingTop:'.5rem'}}>+{incomplete.length-5} more</div>}
                    </div>
                  </div>
                )}

                {/* TX REVIEW STEP */}
                {!isIntro && !isSummary && currentTx && edit && (
                  <div>
                    <div className={`wizard-tx-card ${edit.skip?'skipped':(!edit.wallet||!edit.wallet2)?'needs-fix':'fixed'}`}>
                      <div className="wizard-tx-meta">
                        <span className="wizard-tx-amount">{parseFloat(currentTx.amount||0).toFixed(8)} BTC</span>
                        <span className="wizard-tx-date">{fmtDate(currentTx.date)}</span>
                        {currentTx.fee && <span style={{fontSize:'.75rem',color:'var(--text-tertiary)'}}>fee: {currentTx.fee} BTC</span>}
                      </div>
                      {currentTx.notes && <div className="wizard-tx-notes">"{currentTx.notes}"</div>}
                    </div>

                    {edit.skip ? (
                      <div style={{textAlign:'center',padding:'1rem',color:'var(--text-secondary)',fontSize:'.875rem'}}>
                        This transfer will be skipped.
                        <button className="btn btn-secondary btn-sm" style={{display:'block',margin:'.75rem auto 0'}}
                          onClick={()=>setEdit('skip',false)}>Undo Skip</button>
                      </div>
                    ) : (
                      <div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:".75rem",alignItems:"start"}}>
                          <WizardWalletSelect
                            label="From Wallet"
                            value={edit.wallet}
                            wallets={wallets}
                            onChange={v=>setEdit('wallet',v)}
                          />
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center",paddingTop:"1.375rem",color:"var(--text-tertiary)",fontSize:"1.25rem"}}>→</div>
                          <WizardWalletSelect
                            label="To Wallet"
                            value={edit.wallet2}
                            wallets={wallets}
                            onChange={v=>setEdit('wallet2',v)}
                          />
                        </div>
                        {edit.wallet && edit.wallet2 && (
                          <div style={{marginTop:'1rem',background:'var(--green-light)',borderRadius:8,padding:'.625rem 1rem',fontSize:'.8125rem',color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:'.5rem'}}>
                            ✓ Ready: {edit.wallet} → {edit.wallet2}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* SUMMARY STEP */}
                {isSummary && (
                  <div>
                    <div style={{marginBottom:'1.25rem'}}>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.75rem',marginBottom:'1.25rem'}}>
                        {[
                          ['Ready to apply',doneCount,'var(--green)'],
                          ['Skipped',skipCount,'var(--text-secondary)'],
                          ['Still incomplete',total-doneCount-skipCount,'#d97706'],
                        ].map(([label,val,color])=>(
                          <div key={label} style={{background:'var(--bg-tertiary)',borderRadius:10,padding:'.875rem',textAlign:'center'}}>
                            <div style={{fontSize:'1.5rem',fontWeight:700,fontFamily:'JetBrains Mono',color}}>{val}</div>
                            <div style={{fontSize:'.75rem',color:'var(--text-secondary)',marginTop:'.25rem'}}>{label}</div>
                          </div>
                        ))}
                      </div>
                      {Object.entries(wizardEdits).filter(([,e])=>!e.skip&&e.wallet&&e.wallet2).map(([idxStr,e])=>{
                        const tx = transactions[parseInt(idxStr)];
                        return (
                          <div key={idxStr} className="wizard-summary-row">
                            <span style={{color:'var(--text-secondary)',fontSize:'.8125rem'}}>{fmtDate(tx?.date)}</span>
                            <span style={{fontFamily:'JetBrains Mono',fontSize:'.8125rem',color:'var(--bitcoin-orange)'}}>{parseFloat(tx?.amount||0).toFixed(8)}</span>
                            <span style={{fontSize:'.8125rem',fontWeight:500}}>{e.wallet} → {e.wallet2}</span>
                            <span style={{color:'var(--green)',fontSize:'.8125rem'}}>✓</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="wizard-footer">
                <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                  {!isIntro && !isSummary && (
                    <button className="btn btn-secondary btn-sm" onClick={()=>setEdit('skip',!edit?.skip)}>
                      {edit?.skip ? 'Undo Skip' : 'Skip for Now'}
                    </button>
                  )}
                  <span style={{fontSize:'.6875rem',color:'var(--text-tertiary)',whiteSpace:'nowrap'}} className="desktop-only">← → to navigate · Esc to close</span>
                </div>
                <div style={{display:'flex',gap:'.625rem'}}>
                  {wizardStep>0 && (
                    <button className="btn btn-secondary" onClick={()=>setWizardStep(s=>s-1)}>← Back</button>
                  )}
                  {!isSummary && (
                    <button
                      className="btn btn-primary"
                      onClick={isIntro ? ()=>setWizardStep(s=>s+1) : saveCurrentAndNext}
                    >
                      {isIntro ? 'Start →' : wizardStep===total ? 'Review →' : 'Next →'}
                    </button>
                  )}
                  {isSummary && (
                    <button className="btn btn-primary" onClick={applyAll}>
                      Done
                    </button>
                  )}
                </div>
              </div>

            </div>
          </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
