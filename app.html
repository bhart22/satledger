function SVGChart({ data, dataKey, title, subtitle, color, formatY, formatTooltip, fillGradient, refLine, refLineColor, refLineLabel, chartType, overlay, lines, publicData, sampleData, scopeLabel }) {
  const [tooltip, setTooltip] = React.useState(null);
  const [expanded, setExpanded] = React.useState(false);
  const svgRef = React.useRef(null);
  const expandedSvgRef = React.useRef(null);
  const isBar = chartType === 'bar';
  const hasOverlay = overlay && overlay.data && overlay.data.length > 0;
  const overlayGetValueColor = hasOverlay && typeof overlay.getValueColor === 'function'
    ? overlay.getValueColor
    : () => overlay?.color;
  const overlayLegendColor = hasOverlay && typeof overlay.getLegendColor === 'function'
    ? overlay.getLegendColor()
    : overlay?.color;
  const W=480, H=180, PL=58, PR=hasOverlay?52:16, PT=8, PB=32;
  const iW=W-PL-PR, iH=H-PT-PB;

  const hasLines = lines && lines.length > 0;
  const vals = data.map(d=>d[dataKey]);
  // Include line values in Y scale
  let minV = isBar ? 0 : Math.min(...vals);
  let maxV = Math.max(...vals);
  if(hasLines) {
    lines.forEach(ln => {
      data.forEach(d => { if(d[ln.dataKey]!=null) { minV=Math.min(minV,d[ln.dataKey]); maxV=Math.max(maxV,d[ln.dataKey]); } });
    });
  }

  // include refLine in Y scale if present
  const yMin = refLine!=null ? Math.min(minV, refLine-(Math.abs(refLine)*0.03||maxV*0.03)) : minV;
  const yMax = refLine!=null ? Math.max(maxV, refLine+(Math.abs(refLine)*0.03||maxV*0.03)) : maxV;
  const yRange = yMax-yMin || 1;

  // Nice tick step helper
  const niceStep = (range, count) => {
    if(!range || !isFinite(range) || range<=0) return 1;
    const rough = range / count;
    if(!rough || !isFinite(rough) || rough<=0) return 1;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const norm = rough / mag;
    const nice = norm<=1.5?1:norm<=3?2:norm<=7?5:10;
    return nice * mag;
  };

  // Time-based X scale
  const timestamps = data.map(d=>new Date(d.date+'T12:00:00').getTime());
  const tMin = timestamps[0], tMax = timestamps[timestamps.length-1];
  const tRange = tMax - tMin || 1;
  const xScale = i => PL + ((timestamps[i]-tMin)/tRange)*iW;
  const yScale = v => PT + iH - ((v-yMin)/yRange)*iH;

  // Overlay scales
  const oTimestamps = hasOverlay ? overlay.data.map(d=>new Date(d.date+'T12:00:00').getTime()) : [];
  const oVals = hasOverlay ? overlay.data.map(d=>d[overlay.dataKey]) : [];
  const overlayRefLines = hasOverlay && Array.isArray(overlay.refLines) ? overlay.refLines : [];
  const overlayRefVals = overlayRefLines.map(ln => ln.value).filter(v => Number.isFinite(v));
  const oMin = hasOverlay ? Math.min(...oVals, ...overlayRefVals) : 0;
  const oMax = hasOverlay ? Math.max(...oVals, ...overlayRefVals) : 1;
  const oRange = oMax-oMin || 1;
  const oXScale = i => hasOverlay ? PL + ((oTimestamps[i]-tMin)/tRange)*iW : 0;
  const oYScale = v => PT + iH - ((v-oMin)/oRange)*iH;
  const oStep = hasOverlay ? niceStep(oRange, 4) : 1;
  const oTickStart = hasOverlay ? Math.ceil(oMin / oStep) * oStep : 0;
  const oTicks = [];
  if(hasOverlay) { for(let v=oTickStart; v<=oMax+oStep*0.01 && oTicks.length<12; v+=oStep) oTicks.push(+v.toPrecision(10)); }

  const pathD = !isBar ? data.map((d,i)=>`${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(d[dataKey]).toFixed(1)}`).join(' ') : '';
  const areaD = !isBar ? pathD+` L${xScale(data.length-1).toFixed(1)},${(PT+iH).toFixed(1)} L${xScale(0).toFixed(1)},${(PT+iH).toFixed(1)} Z` : '';
  const oPathD = hasOverlay ? overlay.data.map((d,i)=>`${i===0?'M':'L'}${oXScale(i).toFixed(1)},${oYScale(d[overlay.dataKey]).toFixed(1)}`).join(' ') : '';
  const buildOverlaySegments = (xsFn, ysFn) => {
    if(!hasOverlay || typeof overlay.getValueColor !== 'function' || overlay.data.length < 2) return [];
    const segments = [];
    const refLines = Array.isArray(overlay.refLines) ? overlay.refLines : [];
    const thresholds = refLines.map(r => r.value).filter(v => Number.isFinite(v)).sort((a,b) => a - b);
    for(let i=1;i<overlay.data.length;i++) {
      const prevVal = overlay.data[i-1]?.[overlay.dataKey];
      const currVal = overlay.data[i]?.[overlay.dataKey];
      if(prevVal == null || currVal == null) continue;
      const x1 = xsFn(i-1), y1 = ysFn(prevVal), x2 = xsFn(i), y2 = ysFn(currVal);
      // Find threshold crossings between prevVal and currVal
      const crossings = [];
      thresholds.forEach(th => {
        if((prevVal < th && currVal > th) || (prevVal > th && currVal < th)) {
          const t = (th - prevVal) / (currVal - prevVal);
          crossings.push({ t, val: th });
        }
      });
      crossings.sort((a,b) => a.t - b.t);
      if(!crossings.length) {
        segments.push({ d: `M${x1.toFixed(1)},${y1.toFixed(1)} L${x2.toFixed(1)},${y2.toFixed(1)}`, color: overlayGetValueColor(currVal) || overlay.color });
      } else {
        let lastX = x1, lastY = y1, lastVal = prevVal;
        crossings.forEach(cr => {
          const mx = x1 + (x2 - x1) * cr.t, my = y1 + (y2 - y1) * cr.t;
          const midVal = (lastVal + cr.val) / 2;
          segments.push({ d: `M${lastX.toFixed(1)},${lastY.toFixed(1)} L${mx.toFixed(1)},${my.toFixed(1)}`, color: overlayGetValueColor(midVal) || overlay.color });
          lastX = mx; lastY = my; lastVal = cr.val;
        });
        segments.push({ d: `M${lastX.toFixed(1)},${lastY.toFixed(1)} L${x2.toFixed(1)},${y2.toFixed(1)}`, color: overlayGetValueColor(currVal) || overlay.color });
      }
    }
    return segments;
  };
  const oSegments = buildOverlaySegments(oXScale, oYScale);

  // Additional same-scale lines
  const buildLinePath = (ln, xsFn, ysFn) => {
    let started = false;
    return data.map((d,i) => {
      if(d[ln.dataKey]==null) return '';
      const cmd = started ? 'L' : 'M';
      started = true;
      return `${cmd}${xsFn(i).toFixed(1)},${ysFn(d[ln.dataKey]).toFixed(1)}`;
    }).join(' ');
  };
  const linePaths = hasLines ? lines.map(ln => buildLinePath(ln, xScale, yScale)) : [];

  // Bar dimensions
  const barW = isBar && data.length > 1 ? Math.max(2, Math.min(12, (iW / data.length) * 0.5)) : 10;

  // Y axis ticks
  const yStep = niceStep(yRange, 4);
  const yTickStart = Math.ceil(yMin / yStep) * yStep;
  const yTicks = [];
  for(let v=yTickStart; v<=yMax+yStep*0.01 && yTicks.length<12; v+=yStep) yTicks.push(+v.toPrecision(10));
  if(!yTicks.length) yTicks.push(yMin, yMax);
  const buildTimeTicks = (count, width, leftPad) => {
    if(count <= 1 || !isFinite(tRange) || tRange <= 0) {
      return [{ x:leftPad + width/2, t:tMin }];
    }
    return Array.from({ length: count }, (_, idx) => {
      const pct = idx / (count - 1);
      return {
        x: leftPad + pct * width,
        t: tMin + pct * tRange,
      };
    });
  };
  const xTicks = buildTimeTicks(isBar ? 4 : 3, iW, PL);

  const gradId = 'grad_'+dataKey.replace(/[^a-z]/g,'');

  const handleMouseMove = useThrottledCallback((e) => {
    if(!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const scaleX = W / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const hoverT = tMin + ((mx-PL)/iW)*tRange;
    let closest = 0, closestDist = Infinity;
    for(let i=0;i<timestamps.length;i++) {
      const dist = Math.abs(timestamps[i]-hoverT);
      if(dist<closestDist) { closestDist=dist; closest=i; }
    }
    const d = data[closest];
    // Find closest overlay point
    let oVal = null;
    if(hasOverlay) {
      let oc=0, od=Infinity;
      for(let i=0;i<oTimestamps.length;i++) {
        const dist = Math.abs(oTimestamps[i]-timestamps[closest]);
        if(dist<od) { od=dist; oc=i; }
      }
      oVal = overlay.data[oc]?.[overlay.dataKey] ?? null;
    }
    const lineVals = hasLines ? lines.map(ln => d[ln.dataKey] ?? null) : [];
    setTooltip({ x: xScale(closest), y: yScale(d[dataKey]), val: d[dataKey], date: d.date, oVal, lineVals, isExpanded: false });
  }, 32);

  const fmtTickDate = input => {
    const dt = typeof input === 'number' ? new Date(input) : new Date(input+'T12:00:00');
    const options = tRange < 1000 * 60 * 60 * 24 * 120
      ? { month:'short', day:'numeric' }
      : { month:'short', year:'2-digit' };
    return dt.toLocaleDateString('en-US', options);
  };

  // Expanded chart dimensions
  const EW=960, EH=400, EPL=64, EPR=hasOverlay?58:20, EPT=12, EPB=36;
  const eIW=EW-EPL-EPR, eIH=EH-EPT-EPB;
  const exScale = i => EPL + ((timestamps[i]-tMin)/tRange)*eIW;
  const eyScale = v => EPT + eIH - ((v-yMin)/yRange)*eIH;
  const eoXScale = i => hasOverlay ? EPL + ((oTimestamps[i]-tMin)/tRange)*eIW : 0;
  const eoYScale = v => EPT + eIH - ((v-oMin)/oRange)*eIH;
  const eBarW = isBar && data.length > 1 ? Math.max(3, Math.min(18, (eIW / data.length) * 0.5)) : 12;
  const ePathD = !isBar ? data.map((d,i)=>`${i===0?'M':'L'}${exScale(i).toFixed(1)},${eyScale(d[dataKey]).toFixed(1)}`).join(' ') : '';
  const eAreaD = !isBar ? ePathD+` L${exScale(data.length-1).toFixed(1)},${(EPT+eIH).toFixed(1)} L${exScale(0).toFixed(1)},${(EPT+eIH).toFixed(1)} Z` : '';
  const eoPathD = hasOverlay ? overlay.data.map((d,i)=>`${i===0?'M':'L'}${eoXScale(i).toFixed(1)},${eoYScale(d[overlay.dataKey]).toFixed(1)}`).join(' ') : '';
  const eGradId = 'egrad_'+dataKey.replace(/[^a-z]/g,'');
  const eyStep = niceStep(yRange, 8);
  const eyTickStart = Math.ceil(yMin / eyStep) * eyStep;
  const eyTicks = [];
  for(let v=eyTickStart; v<=yMax+eyStep*0.01 && eyTicks.length<16; v+=eyStep) eyTicks.push(+v.toPrecision(10));
  const eoStep = hasOverlay ? niceStep(oRange, 8) : 1;
  const eoTickStart = hasOverlay ? Math.ceil(oMin / eoStep) * eoStep : 0;
  const eoTicks = [];
  if(hasOverlay) { for(let v=eoTickStart; v<=oMax+eoStep*0.01 && eoTicks.length<16; v+=eoStep) eoTicks.push(+v.toPrecision(10)); }
  const eXTicks = buildTimeTicks(isBar ? 6 : 5, eIW, EPL);
  const eoSegments = buildOverlaySegments(eoXScale, eoYScale);

  const handleExpandedMouseMove = useThrottledCallback((e) => {
    if(!expandedSvgRef.current) return;
    const rect = expandedSvgRef.current.getBoundingClientRect();
    const scaleX = EW / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const hoverT = tMin + ((mx-EPL)/eIW)*tRange;
    let closest = 0, closestDist = Infinity;
    for(let i=0;i<timestamps.length;i++) {
      const dist = Math.abs(timestamps[i]-hoverT);
      if(dist<closestDist) { closestDist=dist; closest=i; }
    }
    const d = data[closest];
    let oVal = null;
    if(hasOverlay) {
      let oc=0, od=Infinity;
      for(let i=0;i<oTimestamps.length;i++) {
        const dist = Math.abs(oTimestamps[i]-timestamps[closest]);
        if(dist<od) { od=dist; oc=i; }
      }
      oVal = overlay.data[oc]?.[overlay.dataKey] ?? null;
    }
    const lineVals = hasLines ? lines.map(ln => d[ln.dataKey] ?? null) : [];
    setTooltip({ x: exScale(closest), y: eyScale(d[dataKey]), val: d[dataKey], date: d.date, oVal, lineVals, isExpanded: true });
  }, 32);

  const eLinePaths = hasLines ? lines.map(ln => buildLinePath(ln, exScale, eyScale)) : [];

  const renderSVGContent = (isExp) => {
    const cW = isExp?EW:W, cH = isExp?EH:H, cPL = isExp?EPL:PL, cPR = isExp?EPR:PR, cPT = isExp?EPT:PT, cPB = isExp?EPB:PB;
    const cIW = isExp?eIW:iW, cIH = isExp?eIH:iH;
    const cXScale = isExp?exScale:xScale, cYScale = isExp?eyScale:yScale;
    const cOXScale = isExp?eoXScale:oXScale, cOYScale = isExp?eoYScale:oYScale;
    const cBarW = isExp?eBarW:barW;
    const cPathD = isExp?ePathD:pathD, cAreaD = isExp?eAreaD:areaD, cOPathD = isExp?eoPathD:oPathD;
    const cGradId = isExp?eGradId:gradId;
    const cLinePaths = isExp?eLinePaths:linePaths;
    const cYTicks = isExp?eyTicks:yTicks;
    const cOTicks = isExp?eoTicks:oTicks;
    const cXTicks = isExp?eXTicks:xTicks;
    const cOSegments = isExp?eoSegments:oSegments;
    const cRef = isExp?expandedSvgRef:svgRef;
    const cMouseMove = isExp?handleExpandedMouseMove:handleMouseMove;
    const strokeW = isExp?2.5:2;
    return (
      <svg ref={cRef} width="100%" viewBox={`0 0 ${cW} ${cH}`} style={{display:'block',overflow:'visible'}}
        onMouseMove={cMouseMove} onMouseLeave={()=>setTooltip(null)}>
        <defs>
          <linearGradient id={cGradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
          <clipPath id={'clip_'+cGradId}><rect x={cPL} y={cPT} width={cIW} height={cIH}/></clipPath>
        </defs>
        {cYTicks.map((v,i)=>(
          <line key={i} x1={cPL} x2={cPL+cIW} y1={cYScale(v)} y2={cYScale(v)}
            stroke="var(--border-color)" strokeWidth="1" strokeDasharray="3 3"/>
        ))}
        {refLine!=null && (
          <>
            <line x1={cPL} x2={cPL+cIW} y1={cYScale(refLine)} y2={cYScale(refLine)}
              stroke={refLineColor} strokeWidth="1.5" strokeDasharray="5 4"/>
            <text x={cPL+cIW-(!hasOverlay?0:40)} y={cYScale(refLine)-6} textAnchor="end" fontSize={isExp?'11':'9'} fill={refLineColor}>{refLineLabel}</text>
          </>
        )}
        {hasOverlay && overlayRefLines.map((ln, i) => (
          <React.Fragment key={`overlay-ref-${i}`}>
            <line x1={cPL} x2={cPL+cIW} y1={cOYScale(ln.value)} y2={cOYScale(ln.value)}
              stroke={ln.color || overlay.color} strokeWidth="1" strokeDasharray="5 4" opacity="0.8"/>
            <text x={cPL+cIW-4} y={cOYScale(ln.value)-6} textAnchor="end" fontSize={isExp?'10':'9'} fill={ln.color || overlay.color}>
              {ln.label}
            </text>
          </React.Fragment>
        ))}
        {fillGradient && !isBar && <path d={cAreaD} fill={`url(#${cGradId})`} clipPath={`url(#clip_${cGradId})`}/>}
        {!isBar && <path d={cPathD} fill="none" stroke={color} strokeWidth={strokeW} strokeLinejoin="round" strokeLinecap="round"/>}
        {isBar && data.map((d,i) => {
          const x = cXScale(i) - cBarW/2;
          const barH = ((d[dataKey]-yMin)/yRange)*cIH;
          return <rect key={i} x={x} y={cPT+cIH-barH} width={cBarW} height={Math.max(0,barH)} fill={color} rx="1" opacity={tooltip && tooltip.isExpanded===!!isExp && Math.abs(cXScale(i)-tooltip.x)<cBarW ? 1 : 0.7}/>;
        })}
        {hasOverlay && (!cOSegments.length
          ? <path d={cOPathD} fill="none" stroke={overlay.color} strokeWidth={isExp?2:1.5} strokeDasharray="4 3" strokeLinejoin="round" opacity="0.7"/>
          : cOSegments.map((seg, i) => (
            <path key={`overlay-seg-${i}`} d={seg.d} fill="none" stroke={seg.color} strokeWidth={isExp?2:1.5} strokeDasharray="4 3" strokeLinejoin="round" opacity="0.85"/>
          ))
        )}
        {hasLines && lines.map((ln,li) => (
          <path key={'ln'+li} d={cLinePaths[li]} fill="none" stroke={ln.color} strokeWidth={isExp?2:1.5}
            strokeDasharray={ln.dashed?"6 4":undefined} strokeLinejoin="round" opacity="0.8"/>
        ))}
        {cYTicks.map((v,i)=>(
          <text key={i} x={cPL-6} y={cYScale(v)+4} textAnchor="end" fontSize={isExp?'11':'10'} fill="var(--text-tertiary)">
            {formatY(v)}
          </text>
        ))}
        {hasOverlay && cOTicks.map((v,i)=>(
          <text key={'o'+i} x={cPL+cIW+6} y={cOYScale(v)+4} textAnchor="start" fontSize={isExp?'10':'9'} fill={overlayLegendColor || overlay.color} opacity="0.7">
            {overlay.formatY(v)}
          </text>
        ))}
        {cXTicks.map((tick,i)=>(
          <text key={i} x={tick.x} y={cH-4} textAnchor="middle" fontSize={isExp?'11':'10'} fill="var(--text-tertiary)">
            {fmtTickDate(tick.t)}
          </text>
        ))}
        {tooltip && tooltip.isExpanded===!!isExp && (
          <>
            <line x1={tooltip.x} x2={tooltip.x} y1={cPT} y2={cPT+cIH}
              stroke="var(--border-color)" strokeWidth="1"/>
            {!isBar && <circle cx={tooltip.x} cy={tooltip.y} r={isExp?5:4} fill={color} stroke="var(--bg-secondary)" strokeWidth="2"/>}
          </>
        )}
      </svg>
    );
  };

  const renderTooltipBox = () => tooltip ? (
    <div style={{
      marginTop:'.625rem',
      display:'flex',
      alignItems:'center',
      justifyContent:'space-between',
      gap:'.75rem',
      borderTop:'1px solid var(--border-color)',
      paddingTop:'.625rem',
      fontSize:'.8125rem',
    }}>
      <div style={{color:'var(--text-secondary)',fontSize:'.75rem',whiteSpace:'nowrap'}}>{fmtDate(tooltip.date)}</div>
      <div style={{display:'flex',gap:'.75rem',textAlign:'right',flexWrap:'wrap',justifyContent:'flex-end'}}>
        <div style={{color:color,fontFamily:'JetBrains Mono',fontWeight:600}}>{formatTooltip(tooltip.val)}</div>
        {hasOverlay && tooltip.oVal !== null && <div style={{color:overlayGetValueColor(tooltip.oVal) || overlay.color,fontFamily:'JetBrains Mono',fontWeight:600,fontSize:'.75rem'}}>{overlay.formatTooltip(tooltip.oVal)}</div>}
        {hasLines && tooltip.lineVals && tooltip.lineVals.map((v,i) => v!=null ? (
          <div key={i} style={{color:lines[i].color,fontFamily:'JetBrains Mono',fontWeight:600,fontSize:'.75rem'}}>{lines[i].formatTooltip?lines[i].formatTooltip(v):formatTooltip(v)}</div>
        ) : null)}
      </div>
    </div>
  ) : null;

  const renderLegend = () => (hasOverlay || hasLines) ? (
    <div style={{display:'flex',gap:'1rem',justifyContent:'center',fontSize:'.6875rem',color:'var(--text-tertiary)',marginTop:'.25rem',flexWrap:'wrap'}}>
      <span style={{display:'flex',alignItems:'center',gap:'.25rem'}}><span style={{width:12,height:2,background:color,display:'inline-block',borderRadius:1}}/> {title}</span>
      {hasOverlay && <span style={{display:'flex',alignItems:'center',gap:'.25rem',color:overlayLegendColor || 'var(--text-tertiary)'}}><span style={{width:12,height:2,background:overlayLegendColor || overlay.color,display:'inline-block',borderRadius:1,borderTop:'1px dashed '+(overlayLegendColor || overlay.color)}}/> {overlay.label}</span>}
      {hasLines && lines.map((ln,i) => (
        <span key={i} style={{display:'flex',alignItems:'center',gap:'.25rem'}}><span style={{width:12,height:2,background:ln.color,display:'inline-block',borderRadius:1,...(ln.dashed?{borderTop:'1px dashed '+ln.color,background:'transparent'}:{})}}/> {ln.label}</span>
      ))}
    </div>
  ) : null;

  return (
    <div className={`card${publicData?' public-data':''}`} style={sampleData?{opacity:.7}:{}}>
      <div className="card-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div style={{minWidth:0,display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
          <div>
            <div className="card-title">{title}</div>
            <div className="chart-subtitle" style={{fontSize:'.8125rem',color:'var(--text-secondary)',fontFamily:'JetBrains Mono'}}>{subtitle}</div>
          </div>
          {scopeLabel && <span className="scope-badge">{scopeLabel}</span>}
          {sampleData && <span style={{fontSize:'.625rem',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',background:'var(--bg-tertiary)',color:'var(--text-tertiary)',border:'1px solid var(--border-color)',borderRadius:'4px',padding:'.125rem .375rem',whiteSpace:'nowrap'}}>Sample</span>}
        </div>
        {!sampleData && <button onClick={()=>{setTooltip(null);setExpanded(true);}} title="Expand chart"
          style={{background:'none',border:'none',cursor:'pointer',padding:'6px',color:'var(--text-tertiary)',flexShrink:0,marginTop:'2px'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>}
      </div>
      <div className="card-body" style={{paddingTop:'.25rem',paddingBottom:'.5rem'}}>
        {renderSVGContent(false)}
        {renderLegend()}
        {!tooltip?.isExpanded && renderTooltipBox()}
      </div>
      {expanded && ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)'}}
          onClick={e=>{if(e.target===e.currentTarget){setExpanded(false);setTooltip(null);}}}>
          <div style={{background:'var(--bg-primary)',borderRadius:'16px',width:'calc(100vw - 2rem)',maxWidth:'960px',maxHeight:'calc(100vh - 2rem)',overflow:'auto',boxShadow:'0 25px 50px rgba(0,0,0,.25)'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'1.25rem 1.5rem .5rem'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
                  <div style={{fontSize:'1.125rem',fontWeight:700,color:'var(--text-primary)'}}>{title}</div>
                  {scopeLabel && <span className="scope-badge">{scopeLabel}</span>}
                </div>
                <div className="chart-subtitle" style={{fontSize:'.875rem',color:'var(--text-secondary)',fontFamily:'JetBrains Mono'}}>{subtitle}</div>
              </div>
              <button onClick={()=>{setExpanded(false);setTooltip(null);}} title="Close"
                style={{background:'none',border:'none',cursor:'pointer',padding:'4px',color:'var(--text-secondary)',fontSize:'1.25rem',lineHeight:1}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <div style={{padding:'0 1.5rem 1.25rem'}}>
              {renderSVGContent(true)}
              {renderLegend()}
              {tooltip?.isExpanded && renderTooltipBox()}
            </div>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}


function App() {
  const [transactions, setTransactions] = useState(() => {
    try { if(localStorage.getItem('btc-reset')) return PRELOADED_TRANSACTIONS; const s=localStorage.getItem('btc-tx-v2'); return s ? JSON.parse(s) : PRELOADED_TRANSACTIONS; }
    catch { return PRELOADED_TRANSACTIONS; }
  });
  const [wallets, setWallets] = useState(() => {
    try { if(localStorage.getItem('btc-reset')) return DEFAULT_WALLETS; const s=localStorage.getItem('btc-wallets'); return s ? JSON.parse(s) : DEFAULT_WALLETS; }
    catch { return DEFAULT_WALLETS; }
  });
  const [vault, setVault] = useState(() => {
    try { const s=localStorage.getItem(VAULT_STORAGE_KEY); return s ? JSON.parse(s) : null; }
    catch { return null; }
  });
  const [vaultDraft, setVaultDraft] = useState(() => emptyVaultDraft());
  const [vaultUnlocked, setVaultUnlocked] = useState(false);
  const [vaultEmergencyMode, setVaultEmergencyMode] = useState(false);
  const [vaultBusy, setVaultBusy] = useState(false);
  const [vaultError, setVaultError] = useState('');
  const [vaultPassphraseInput, setVaultPassphraseInput] = useState('');
  const [vaultSetupPassphrase, setVaultSetupPassphrase] = useState('');
  const [vaultSetupConfirm, setVaultSetupConfirm] = useState('');
  const [vaultNewPassphrase, setVaultNewPassphrase] = useState('');
  const [vaultNewPassphraseConfirm, setVaultNewPassphraseConfirm] = useState('');
  const vaultPassphraseRef = useRef('');
  const [theme, setTheme] = useState(() => localStorage.getItem('btc-theme')||'light');
  const [settings, setSettings] = useState(() => {
    try {
      const s = localStorage.getItem('btc-settings');
      return normalizeSettings(s ? JSON.parse(s) : { defaultTxType:'Buy' });
    } catch {
      return normalizeSettings({ defaultTxType:'Buy' });
    }
  });
  const [rsiThresholdDraft, setRsiThresholdDraft] = useState(() => {
    const thresholds = normalizeRsiThresholds(settings.rsiThresholds);
    return {
      overbought: thresholds.overbought == null ? '' : String(thresholds.overbought),
      oversold: thresholds.oversold == null ? '' : String(thresholds.oversold),
    };
  });
  const [rsiThresholdError, setRsiThresholdError] = useState('');
  useEffect(() => {
    const thresholds = normalizeRsiThresholds(settings.rsiThresholds);
    setRsiThresholdDraft({
      overbought: thresholds.overbought == null ? '' : String(thresholds.overbought),
      oversold: thresholds.oversold == null ? '' : String(thresholds.oversold),
    });
    setRsiThresholdError('');
  }, [settings.rsiThresholds?.overbought, settings.rsiThresholds?.oversold]);
  const updateSettings = (patch) => {
    setSettings(prev => {
      const next = normalizeSettings({...prev, ...patch});
      localStorage.setItem('btc-settings', JSON.stringify(next));
      if(GDriveSync.isSignedIn()) {
        if(syncDebounce.current) clearTimeout(syncDebounce.current);
        setSyncState('syncing');
        syncDebounce.current = setTimeout(async () => {
          try {
            const txs = JSON.parse(localStorage.getItem('btc-tx-v2')||'[]');
            const wals = JSON.parse(localStorage.getItem('btc-wallets')||'[]');
            const mod = new Date().toISOString();
            localStorage.setItem('btc-last-modified', mod);
            const storedVault = (() => { try { return JSON.parse(localStorage.getItem(VAULT_STORAGE_KEY)||'null'); } catch { return null; } })();
            await GDriveSync.push({ transactions: txs, wallets: wals, settings: next, vault: storedVault, lastModified: mod });
            setSyncState('synced');
            setLastSync(new Date());
          } catch(e) {
            console.error('Settings sync failed:', e);
            setSyncState('error');
          }
        }, 1500);
      }
      return next;
    });
  };
  const handleRsiThresholdDraftChange = (key, value) => {
    const nextDraft = { ...rsiThresholdDraft, [key]: value };
    setRsiThresholdDraft(nextDraft);
    const validation = validateRsiThresholdDraft(nextDraft);
    setRsiThresholdError(validation.error);
    if(validation.error) return;
    const current = normalizeRsiThresholds(settings.rsiThresholds);
    if(current.overbought === validation.overbought && current.oversold === validation.oversold) return;
    updateSettings({ rsiThresholds: { overbought: validation.overbought, oversold: validation.oversold } });
  };
  const [tab, setTab] = useState(() => {
    const hash = location.hash.slice(1);
    return NAV_ITEMS.some(n => n.key === hash) ? hash : 'dashboard';
  });
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => localStorage.getItem('btc-sidebar-collapsed') === 'true');
  const [moreStats, setMoreStats] = useState(false);
  const [walletsOpen, setWalletsOpen] = useState(false);
  const [showGuide, setShowGuide] = useState(false);

  // Persist — explicit saves only, no auto-write useEffects

      setHistoricalPriceLoading(true);

        const today = dayKeyUTC(Date.now());
        const cached = (() => {
          try { return JSON.parse(localStorage.getItem(HISTORICAL_PRICE_CACHE_KEY)||'{}'); }
          catch { return {}; }
        })();
        // Without transactions, still fetch full BTC history so the MA chart can stay live.
        const baseStart = firstTransactionDate || '2014-01-01';
        const maLookbackDate = addDaysUTC(baseStart, -1400);
        const dataStart = maLookbackDate < '2014-01-01' ? '2014-01-01' : maLookbackDate;
        const requiredDays = listDaysUTC(dataStart, today);
        const refreshStart = addDaysUTC(today, -2);
        const firstMissingDay = requiredDays.find(day => cached[day]===undefined);
        const fetchStart = firstMissingDay && firstMissingDay < refreshStart ? firstMissingDay : refreshStart > dataStart ? refreshStart : dataStart;
        let merged = {...cached};
        for(let cursor = fetchStart; cursor <= today; cursor = addDaysUTC(cursor, 300)) {
          const endExclusive = addDaysUTC(cursor, 300);
          const url = `https://api.exchange.coinbase.com/products/BTC-USD/candles?granularity=86400&start=${cursor}T00:00:00Z&end=${endExclusive}T00:00:00Z`;
          const r = await fetch(url);
          if(!r.ok) throw new Error('historical_price_fetch_failed');
          const candles = await r.json();
          candles.forEach(row => {
            const [time,,,,close] = row;
            merged[dayKeyUTC(time*1000)] = close;
          });
        }
        merged = fillDailyPriceGaps(merged, dataStart, today);
        if(cancelled) return;
        setHistoricalPrices(merged);
        localStorage.setItem(HISTORICAL_PRICE_CACHE_KEY, JSON.stringify(merged));
      } catch(e) {
        console.error('Historical price fetch failed:', e);
        if(!cancelled) showToast('Could not fetch BTC price history');

        if(!cancelled) setHistoricalPriceLoading(false);
      }

  // ─── Google Drive Sync ────────────────────────────────────────────────────
  const handleSignIn = useCallback(async () => {
    try {
      const ready = await GDriveSync.init();
      if(!ready) { showToast('Google Sign-In failed to load'); return; }
      await GDriveSync.requestToken(true);
      setSyncState('syncing');
      // Get user info
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { 'Authorization': 'Bearer ' + GDriveSync.accessToken }
        });
        const info = await r.json();
        setSyncUser({ email: info.email, name: info.name });
        localStorage.setItem('btc-sync-user', JSON.stringify({ email: info.email, name: info.name }));
      } catch(e) {}
      localStorage.setItem('btc-sync-enabled', 'true');
      // Pull from Drive
      const remote = await GDriveSync.pull();
      const localTxCount = transactions.length;
      const remoteTxCount = remote?.transactions?.length || 0;
      const localHasData = localTxCount > 0 || wallets.length > 0 || !!vault;
      const remoteHasData = !!remote && (remoteTxCount > 0 || (remote?.wallets?.length||0) > 0 || !!remote?.vault);

      if(remote && (Array.isArray(remote.transactions) || remote.vault)) {
        const localMod = localStorage.getItem('btc-last-modified') || '0';
        const remoteMod = remote.lastModified || '0';
        const localIsEmpty = !localHasData;
        const remoteIsEmpty = !remoteHasData;

        if(localIsEmpty && !remoteIsEmpty) {
          // Fresh device — always pull remote data down
          setTransactions(Array.isArray(remote.transactions) ? remote.transactions : []);
          setWallets(remote.wallets || []);
          if(Object.prototype.hasOwnProperty.call(remote, 'vault')) {
            setVault(remote.vault || null);
            if(remote.vault) localStorage.setItem(VAULT_STORAGE_KEY, JSON.stringify(remote.vault));
            else localStorage.removeItem(VAULT_STORAGE_KEY);
          }
          if(remote.settings) {
            const normalized = normalizeSettings(remote.settings);
            setSettings(normalized);
            localStorage.setItem('btc-settings', JSON.stringify(normalized));
          }
          localStorage.setItem('btc-tx-v2', JSON.stringify(remote.transactions));
          localStorage.setItem('btc-wallets', JSON.stringify(remote.wallets || []));
          localStorage.setItem('btc-last-modified', remoteMod);
          showToast(`Restored ${remoteTxCount} transactions from Google Drive`);
        } else if(!localIsEmpty && remoteIsEmpty) {
          // Remote is empty, local has data — push up
          const settingsData = JSON.parse(localStorage.getItem('btc-settings')||'{}');
          const mod = new Date().toISOString();
          await GDriveSync.push({ transactions, wallets, settings: settingsData, vault, lastModified: mod });
          localStorage.setItem('btc-last-modified', mod);
          showToast('Backed up to Google Drive');
        } else if(remoteTxCount > localTxCount || remoteMod > localMod) {
          // Remote has more data or is newer — pull
          setTransactions(Array.isArray(remote.transactions) ? remote.transactions : []);
          setWallets(remote.wallets || []);
          if(Object.prototype.hasOwnProperty.call(remote, 'vault')) {
            setVault(remote.vault || null);
            if(remote.vault) localStorage.setItem(VAULT_STORAGE_KEY, JSON.stringify(remote.vault));
            else localStorage.removeItem(VAULT_STORAGE_KEY);
          }
          if(remote.settings) {
            const normalized = normalizeSettings(remote.settings);
            setSettings(normalized);
            localStorage.setItem('btc-settings', JSON.stringify(normalized));
          }
          localStorage.setItem('btc-tx-v2', JSON.stringify(remote.transactions));
          localStorage.setItem('btc-wallets', JSON.stringify(remote.wallets || []));
          localStorage.setItem('btc-last-modified', remoteMod);
          showToast(`Updated from Google Drive — ${remoteTxCount} transactions`);
        } else {
          // Local has more data or same — sync up
          const settingsData = JSON.parse(localStorage.getItem('btc-settings')||'{}');
          const mod = new Date().toISOString();
          await GDriveSync.push({ transactions, wallets, settings: settingsData, vault, lastModified: mod });
          localStorage.setItem('btc-last-modified', mod);
          showToast(localTxCount === remoteTxCount ? 'Connected — everything is up to date' : `Synced to Google Drive — ${localTxCount} transactions`);

  // ─── Wallet holdings ─────────────────────────────────────────────────────
  const walletHoldings = useMemo(() => {
    const h = {};
    transactions.forEach(tx => {
      const amt = parseFloat(tx.amount)||0;
      const fee = parseFloat(tx.fee)||0;
      const w1 = tx.wallet;
      const w2 = tx.wallet2;
      if(!w1) return;
      if(!h[w1]) h[w1]=0;
      if(tx.type==='Buy'||tx.type==='Reward') { h[w1]+=amt; }
      else if(tx.type==='Sell') { h[w1]-=amt; }
      else if(tx.type==='Transfer') {
        h[w1]-=(amt+fee);
        if(w2) { if(!h[w2]) h[w2]=0; h[w2]+=amt; }
      } else if(tx.type==='Consolidation') {
        h[w1]-=fee; // only fee is lost; BTC stays in same wallet
      }
    });
    return h;
  }, [transactions]);

  // Per-wallet cost basis
  const walletCostBasis = useMemo(() => {
    const cb = {};
    transactions.forEach(tx => {
      if(tx.excludeStats) return;
      const amt = parseFloat(tx.amount)||0;
      const price = parseFloat(tx.price)||0;
      const fee = parseFloat(tx.fee)||0;
      const w = tx.wallet;
      if(!w) return;
      if(!cb[w]) cb[w] = { cost: 0, btcAcquired: 0 };
      if(tx.type==='Buy') {
        const cost = (tx.totalUsd ? parseFloat(tx.totalUsd) : (amt*price)) + fee;
        cb[w].cost += cost;
        cb[w].btcAcquired += amt;
      } else if(tx.type==='Reward') {
        cb[w].btcAcquired += amt;
      }
    });
    return cb;
  }, [transactions]);

    return Object.entries(walletHoldings)

  }, [walletHoldings, trackedHoldings, hasDashboardWalletFilter, selectedDashboardWalletSet]);

  // ─── Stats (ALL transactions, not filtered by registered wallets) ────────
  const stats = useMemo(() => {
    let totalBought=0, totalSold=0, totalFeesBTC=0, costBasis=0, runningBTC=0, rewardsIncome=0;
    // Sort by date to process sells in chronological order for proportional cost reduction
    const sorted = [...transactions].filter(tx => !tx.excludeStats)
      .map(tx => ({ ...tx, _nd: normalizeDate(tx.date) }))
      .filter(tx => tx._nd)
      .sort((a,b) => a._nd.localeCompare(b._nd));
    sorted.forEach(tx => {
      const amt = parseFloat(tx.amount)||0;
      const price = parseFloat(tx.price)||0;
      const fee = parseFloat(tx.fee)||0;
      if(tx.type==='Buy') {
        totalBought+=amt; runningBTC+=amt;
        costBasis+=(tx.totalUsd ? parseFloat(tx.totalUsd) : (amt*price))+fee;
      } else if(tx.type==='Sell') {
        totalSold+=amt;
        const ratio = runningBTC > 0.00000001 ? amt / runningBTC : 0;
        costBasis -= costBasis * ratio;
        runningBTC -= amt;
      } else if(tx.type==='Transfer') { totalFeesBTC+=fee; runningBTC-=fee; }
      else if(tx.type==='Consolidation') { totalFeesBTC+=fee; runningBTC-=fee; }
      else if(tx.type==='Reward') { totalBought+=amt; runningBTC+=amt; rewardsIncome+=amt; }
    });
    // Use trackedHoldings (wallet-based) for market value — it correctly handles transfers
    const currentValue = trackedHoldings * (btcPrice||0);
    const unrealized = currentValue - costBasis;
    return { totalBought, totalSold, totalFeesBTC, costBasis, rewardsIncome, currentValue, unrealized };
  }, [transactions, btcPrice, trackedHoldings]);

  // ─── Filtered transactions ────────────────────────────────────────────────
  const filtered = useMemo(() => {
    return transactions.map((tx, origIdx) => ({...tx, _origIdx: origIdx})).filter(tx => {
      if(filterType!=='All' && tx.type!==filterType) return false;
      if(filterWallet!=='All' && tx.wallet!==filterWallet && tx.wallet2!==filterWallet) return false;
      if(filterYear!=='All' && !tx.date.startsWith(filterYear)) return false;
      if(filterDateFrom && tx.date < filterDateFrom) return false;
      if(filterDateTo && tx.date > filterDateTo) return false;
      if(search) {
        const q = search.toLowerCase();
        if(!( tx.wallet?.toLowerCase().includes(q) || tx.wallet2?.toLowerCase().includes(q) ||
              tx.notes?.toLowerCase().includes(q) || tx.txhash?.toLowerCase().includes(q) ||
              tx.type?.toLowerCase().includes(q) || tx.amount?.includes(q) )) return false;
      }
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date));
  }, [transactions, filterType, filterWallet, filterYear, filterDateFrom, filterDateTo, search]);

  const years = useMemo(() => [...new Set(transactions.map(t=>t.date.slice(0,4)))].sort().reverse(), [transactions]);
  const walletNames = useMemo(() => [...new Set(transactions.flatMap(t=>[t.wallet,t.wallet2].filter(Boolean)))].sort(), [transactions]);

  const paged = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length/PAGE_SIZE));

  // ─── CRUD ─────────────────────────────────────────────────────────────────
  const handleSubmit = () => {
    // Validate required fields
    if(!form.date || !form.amount) { showToast('Date and Amount are required'); return; }
    if((form.type==='Buy'||form.type==='Sell') && !form.price && !form.totalUsd) { showToast('Price or Total USD is required for Buy/Sell'); return; }
    // If totalUsd provided but no price, derive price
    const finalForm = {...form};
    if((finalForm.type==='Buy'||finalForm.type==='Sell') && finalForm.totalUsd && !finalForm.price && finalForm.amount) {
      finalForm.price = (parseFloat(finalForm.totalUsd)/parseFloat(finalForm.amount)).toFixed(2);
    }
    // Warn if sell/transfer would cause negative wallet balance
    let negativeWarning = '';
    if(finalForm.type==='Sell' || finalForm.type==='Transfer') {
      const amt = parseFloat(finalForm.amount)||0;
      const fee = finalForm.type==='Transfer' ? (parseFloat(finalForm.fee)||0) : 0;
      const walletBal = walletHoldings[finalForm.wallet] || 0;
      // If editing, add back the old transaction's impact
      let adjustment = 0;
      if(editIdx!==null) {
        const old = transactions[editIdx];
        if(old.type==='Sell') adjustment = parseFloat(old.amount)||0;
        else if(old.type==='Transfer') adjustment = (parseFloat(old.amount)||0) + (parseFloat(old.fee)||0);
      }
      if(walletBal + adjustment - amt - fee < -0.000000005) {
        negativeWarning = ` ⚠ ${finalForm.wallet} balance is now negative (${fmtBTC(walletBal + adjustment - amt - fee)} BTC)`;
      }
    }
    if(editIdx!==null) {
      const u=[...transactions]; u[editIdx]=finalForm; setTransactions(u); save(u, wallets);
      showToast('Transaction updated' + negativeWarning);
    } else {
      const added=[...transactions, finalForm]; setTransactions(added); save(added, wallets);
      showToast('Transaction added' + negativeWarning);
    }
    setShowModal(false); setEditIdx(null); setForm(emptyForm());
  };

  const handleEdit = idx => {
    const tx = transactions[idx];
    const totalUsd = tx.totalUsd || ((tx.amount && tx.price) ? (parseFloat(tx.amount)*parseFloat(tx.price)).toFixed(2) : '');
    setForm({...tx, totalUsd});
    setEditIdx(idx);
    setShowModal(true);
  };
  const handleDelete = idx => {
    const tx = transactions[idx];
    setConfirmDialog({
      title: 'Delete Transaction',
      message: `Delete the ${tx.type} of ${fmtBTC(tx.amount)} BTC on ${fmtDate(tx.date)}? This cannot be undone — consider exporting a backup first.`,
      confirmLabel: 'Delete',
      danger: true,
      onConfirm: () => { const filtered=transactions.filter((_,i)=>i!==idx); setTransactions(filtered); save(filtered, wallets); showToast('Deleted'); setConfirmDialog(null); },
    });
  };

  const handleWalletSubmit = (e) => {
    e.preventDefault();
    if(editWalletIdx!==null) {
      const u=[...wallets]; u[editWalletIdx]={...u[editWalletIdx],...walletForm}; setWallets(u); save(transactions, u);
    } else {
      const nw=[...wallets,{id:'w'+Date.now(),...walletForm}]; setWallets(nw); save(transactions, nw);
    }
    setShowWalletModal(false); setEditWalletIdx(null); setWalletForm({name:'',type:'Exchange',address:''});
  };

  // ─── Export CoinLedger CSV ────────────────────────────────────────────────
  // Wallets tracked via external API (e.g. Coinbase) — skip Withdrawal row for these,
  // only emit the Deposit on the receiving side. Configurable in Settings.
  const exportCSV = (yearFilter) => {
    const headers = ['Date (UTC)','Platform (Optional)','Asset Sent','Amount Sent','Asset Received','Amount Received','Fee Currency (Optional)','Fee Amount (Optional)','Type','Description (Optional)','TxHash (Optional)'];
    const src = [...(yearFilter ? transactions.filter(t=>t.date.startsWith(yearFilter)) : transactions)];
    const fmtNum = v => v ? parseFloat(v).toFixed(8).replace(/\.?0+$/,'') : '';
    const rows = [];

    src.sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx => {
      const amt = tx.amount||''; const fee = tx.fee||'';
      const dateStr = tx.date+' 00:00:00';

      if(tx.type==='Buy') {
        const usd = tx.totalUsd ? parseFloat(tx.totalUsd).toFixed(2) : (parseFloat(amt)*parseFloat(tx.price||0)).toFixed(2);
        rows.push([dateStr, tx.wallet||'', 'USD', usd, 'BTC', fmtNum(amt),
          fee ? 'USD' : '', fee ? parseFloat(fee).toFixed(2) : '',
          'Trade', tx.notes||'', tx.txhash||'']);

      } else if(tx.type==='Sell') {
        const usd = tx.totalUsd ? parseFloat(tx.totalUsd).toFixed(2) : (parseFloat(amt)*parseFloat(tx.price||0)).toFixed(2);
        rows.push([dateStr, tx.wallet||'', 'BTC', fmtNum(amt), 'USD', usd,
          fee ? 'USD' : '', fee ? parseFloat(fee).toFixed(2) : '',
          'Trade', tx.notes||'', tx.txhash||'']);

      } else if(tx.type==='Transfer') {
        // Withdrawal row
        rows.push([dateStr, tx.wallet||'', 'BTC', fmtNum(amt), '', '',
          fee ? 'BTC' : '', fee ? fmtNum(fee) : '',
          'Withdrawal', tx.notes||`Transfer to ${tx.wallet2||'wallet'}`, tx.txhash||'']);
        // Deposit row
        if(tx.wallet2) {
          rows.push([dateStr, tx.wallet2, '', '', 'BTC', fmtNum(amt),
            '', '',
            'Deposit', `Transfer from ${tx.wallet||'wallet'}`, tx.txhash||'']);
        }
      } else if(tx.type==='Consolidation') {
        // UTXO consolidation: same wallet in/out, only fee is lost
        // CoinLedger: single Withdrawal row with fee, 0 amount sent
        if(fee) {
          rows.push([dateStr, tx.wallet||'', 'BTC', fmtNum(fee), '', '',
            '', '',
            'Withdrawal', tx.notes||`UTXO consolidation fee`, tx.txhash||'']);
        }

      } else if(tx.type==='Reward') {
        rows.push([dateStr, tx.wallet||'', '', '', 'BTC', fmtNum(amt),
          '', '', 'Income', tx.notes||'', tx.txhash||'']);
      }
    });
    const csv=[headers,...rows].map(r=>r.map(f=>'"'+String(f).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download=`coinledger-${yearFilter||'all'}-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast(`Exported ${rows.length} transactions`);
  };

  // ─── Export Full Backup JSON ──────────────────────────────────────────────
  const exportNativeCSV = () => {
    const payload = {
      version: '3.31',
      exportedAt: new Date().toISOString(),
      transactions,
      wallets,
      settings,
      vault,
      lastModified: localStorage.getItem('btc-last-modified')||new Date().toISOString(),
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)], { type:'application/json' }));
    a.download = `btc-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
  };

  // ─── Import Backup / CSV ──────────────────────────────────────────────────
  const importCSV = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload = ev => {
      const raw = ev.target.result;
      const trimmed = raw.trim();
      if(file.name.toLowerCase().endsWith('.json') || trimmed.startsWith('{')) {
        try {
          const parsed = JSON.parse(trimmed);
          if(Array.isArray(parsed.transactions) || parsed.vault || Array.isArray(parsed.wallets) || parsed.settings) {
            const importedTransactions = Array.isArray(parsed.transactions) ? parsed.transactions : [];
            const importedWallets = Array.isArray(parsed.wallets) ? parsed.wallets : [];
            setTransactions(importedTransactions);
            setWallets(importedWallets);
            if(parsed.settings) {
              const normalized = normalizeSettings(parsed.settings);
              setSettings(normalized);
              localStorage.setItem('btc-settings', JSON.stringify(normalized));
            }
            const importedVault = parsed.vault || null;
            setVault(importedVault);
            if(importedVault) localStorage.setItem(VAULT_STORAGE_KEY, JSON.stringify(importedVault));
            else localStorage.removeItem(VAULT_STORAGE_KEY);
            lockVault();
            save(importedTransactions, importedWallets, { vault: importedVault, mod: parsed.lastModified || new Date().toISOString() });
            showToast('Backup restored');
          } else {
            showToast('Backup file does not contain tracker data');
          }
        } catch {
          showToast('Could not import backup file');
        }
        e.target.value='';
        return;
      }
      const lines=raw.split('\n');
      const hdr=lines[0].toLowerCase();
      const isCL=hdr.includes('asset sent')||hdr.includes('asset received');
      // Parse CSV line respecting quoted fields
      const parseCSVLine = (line) => {
        const result = []; let current = ''; let inQuotes = false;
        for(let c = 0; c < line.length; c++) {
          if(inQuotes) {
            if(line[c] === '"' && line[c+1] === '"') { current += '"'; c++; }
            else if(line[c] === '"') { inQuotes = false; }
            else { current += line[c]; }
          } else {
            if(line[c] === '"') { inQuotes = true; }
            else if(line[c] === ',') { result.push(current.trim()); current = ''; }
            else { current += line[c]; }
          }
        }
        result.push(current.trim());
        return result;
      };
      const imported=[];
      // Dedup helper: build set of existing transaction keys
      const txKey = (tx) => `${tx.date}|${tx.type}|${tx.wallet}|${tx.amount}`;
      const existingKeys = new Set(transactions.map(txKey));
      let dupeCount = 0;
      for(let i=1;i<lines.length;i++) {
        const line=lines[i].trim(); if(!line) continue;
        const cols=parseCSVLine(line);
        if(isCL) {
          if(cols.length<9) continue;
          const [dateStr,platform,assetSent,amtSent,assetRecv,amtRecv,feeCur,feeAmt,clType,desc,,txhash]=cols;
          let d=dateStr.split(' ')[0];
          // Handle YYYY-MM-DD and MM/DD/YYYY
          if(d.includes('/')) { const p=d.split('/'); d=`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; }
          let type='Buy', amount='', price='', fee='', totalUsd='';
          if(clType==='Trade'&&assetRecv==='BTC') { type='Buy'; amount=amtRecv; totalUsd=amtSent||''; price=amtSent&&amtRecv?(parseFloat(amtSent)/parseFloat(amtRecv)).toFixed(2):''; fee=feeAmt; }
          else if(clType==='Trade'&&assetSent==='BTC') { type='Sell'; amount=amtSent; totalUsd=amtRecv||''; price=amtRecv&&amtSent?(parseFloat(amtRecv)/parseFloat(amtSent)).toFixed(2):''; fee=feeAmt; }
          else if(['Withdrawal','Transfer','Deposit'].includes(clType)) { type='Transfer'; amount=amtSent||amtRecv; fee=feeAmt; }
          else if(['Income','Mining','Staking','Airdrop','Reward'].includes(clType)) { type='Reward'; amount=amtRecv; }
          else if(clType==='Deposit') { type='Transfer'; amount=amtRecv; }
          const newTx = {date:d,type,wallet:platform||'',wallet2:'',amount,price,fee,totalUsd,notes:desc||'',txhash:txhash||''};
          if(existingKeys.has(txKey(newTx))) { dupeCount++; continue; }
          imported.push(newTx);
        } else {
          if(cols.length<6) continue;
          const newTx = {date:cols[0],type:cols[1],wallet:cols[2],wallet2:cols[3]||'',amount:cols[4],price:cols[5],fee:cols[6]||'',totalUsd:cols[7]||'',notes:cols[8]||'',txhash:cols[9]||'',excludeStats:cols[10]==='true'};
          // Backward compat: old format had notes at index 7 and txhash at 8 (no totalUsd)
          // Detect by checking if cols[7] looks like a number (totalUsd) or text (notes)
          if(cols.length<=9 && cols[7] && isNaN(parseFloat(cols[7]))) {
            newTx.totalUsd = '';
            newTx.notes = cols[7]||'';
            newTx.txhash = cols[8]||'';
            newTx.excludeStats = false;
          }
          if(existingKeys.has(txKey(newTx))) { dupeCount++; continue; }
          imported.push(newTx);
        }
      }
      if(imported.length) { setImportPreview({ rows: imported, dupeCount, format: isCL ? 'CoinLedger' : 'CSV' }); }
      else if(dupeCount) showToast(`All ${dupeCount} transactions already exist — nothing imported`);
      else showToast('No valid transactions found');
    };
    reader.readAsText(file);
    e.target.value='';
  };

  // ─── Render ───────────────────────────────────────────────────────────────
  const isSampleMode = transactions.length === 0;
  const effectiveSettings = isSampleMode
    ? {
        ...settings,
        bgDots: settings.bgDots === undefined ? false : settings.bgDots,
        showVault: settings.showVault === undefined ? false : settings.showVault,
        rsiThresholds: normalizeRsiThresholds(settings.rsiThresholds),
      }
    : normalizeSettings(settings);
  const effectiveHiddenCharts = isSampleMode && (settings.hiddenCharts||{}).monthly === undefined
    ? { ...(settings.hiddenCharts||{}), monthly: true }
    : (settings.hiddenCharts||{});
  const effectiveMaLines = isSampleMode && (settings.maLines||{}).rsi14 === undefined
    ? { ...(settings.maLines||{}), rsi14: false }
    : (settings.maLines||{});

  return (
    <div className={`app ${effectiveSettings.hideValues?'values-hidden':''}`}>
      {/* Header */}
      <header className="header">
        <button className="hamburger" onClick={()=>setMobileMenuOpen(true)}>
          {Icon.Menu({width:18,height:18})}
        </button>
        <button className="sidebar-collapse-btn desktop-only" onClick={()=>setSidebarCollapsed(c=>!c)} title={sidebarCollapsed?'Expand sidebar':'Collapse sidebar'}>
          {sidebarCollapsed ? Icon.ChevronRight({width:16,height:16}) : Icon.ChevronLeft({width:16,height:16})}
        </button>
        <div className="header-inner">
          <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
            <div className="logo">
              <img className="logo-icon logo-icon-light" src="images/logo-dark.png" alt="SatLedger" />
              <img className="logo-icon logo-icon-dark" src="images/logo-white.png" alt="SatLedger" />
              <span className="logo-text">SatLedger</span>
              <span className="logo-tagline desktop-only">Track your Bitcoin, your way</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
            {/* Sync status */}
            {syncState==='disconnected' ? (
              <button className="sync-pill" onClick={handleSignIn} title="Sign in with Google to sync across devices">
                {Icon.Cloud({width:12,height:12})}
                <span className="desktop-only">Sign in</span>
              </button>
            ) : (
              <button className={`sync-pill ${syncState}`} onClick={()=>setTab('settings')} title={syncUser ? `Synced as ${syncUser.email}` : 'Sync status'}>
                <div className={`sync-dot ${syncState==='synced'?'connected':syncState==='syncing'?'syncing':'error'}`}/>
                <span className="desktop-only">{syncState==='syncing'?'Syncing…':syncState==='error'?'Sync error':'Synced'}</span>
              </button>
            )}
            {btcPrice && (
              <div className="price-pill" onClick={fetchPrice} style={{cursor:'pointer'}} title="Click to refresh BTC price">
                <div className={`price-dot${priceLoading?' loading':''}`}/>
                {fmtUSD(btcPrice)}
              </div>
            )}
            <button className="btn btn-secondary btn-sm" onClick={()=>updateSettings({hideValues:!settings.hideValues})} title={effectiveSettings.hideValues?'Show values':'Hide values'} style={{padding:'.375rem .5rem',minWidth:0}}>
              {effectiveSettings.hideValues ? Icon.EyeOff({width:14,height:14}) : Icon.Eye({width:14,height:14})}
            </button>
            <button className="btn btn-primary" onClick={()=>{setForm(emptyForm());setEditIdx(null);setShowModal(true);}}>
              + <span className="desktop-only">Add Transaction</span><span className="mobile-only">Add</span>
            </button>
          </div>
        </div>
      </header>

      {/* Mobile drawer */}
      <div className={`drawer-overlay ${mobileMenuOpen?'open':''}`} onClick={()=>setMobileMenuOpen(false)}/>
      <nav className={`mobile-drawer ${mobileMenuOpen?'open':''}`}>
        <div className="mobile-drawer-header">
          <button className="btn-icon" onClick={()=>setMobileMenuOpen(false)}>{Icon.X()}</button>
          <span className="logo-text">SatLedger</span>
          <img className="logo-icon logo-icon-light" src="images/logo-dark.png" alt="SatLedger" />
          <img className="logo-icon logo-icon-dark" src="images/logo-white.png" alt="SatLedger" />
        </div>
        <div className="mobile-drawer-nav">
          {NAV_ITEMS.filter(item=> item.key!=='vault' || effectiveSettings.showVault!==false).map(item=>(
            <button key={item.key} className={`sidebar-item ${tab===item.key?'active':''}`} onClick={()=>{setTab(item.key);setMobileMenuOpen(false);}}>
              {Icon[item.icon]({width:18,height:18})}
              <span>{item.label}</span>
            </button>
          ))}
        </div>
        <div className="sidebar-theme">
          <button className={`sidebar-theme-toggle ${theme}`} onClick={()=>setTheme(t=>t==='light'?'dark':'light')} title={theme==='light'?'Switch to dark mode':'Switch to light mode'}>
            <div className="toggle-knob"/>
          </button>
          <span className="sidebar-theme-label" style={{display:'flex',alignItems:'center',gap:'.375rem'}}>{theme==='dark' ? Icon.Moon({width:14,height:14}) : Icon.Sun({width:14,height:14})} {theme==='dark' ? 'Dark mode' : 'Light mode'}</span>
        </div>
        <div className="sidebar-utility-links" style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
          <button onClick={()=>{setShowGuide(true);setMobileMenuOpen(false);}} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem',padding:'.5rem .75rem',background:'none',border:'none',color:'var(--text-secondary)',cursor:'pointer',fontSize:'.8125rem',fontFamily:'inherit',width:'100%',textAlign:'center'}}>
            {Icon.HelpCircle({width:16,height:16})} How it works
          </button>
          <button onClick={()=>{setShowTipJar(true);setMobileMenuOpen(false);}} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem',padding:'.5rem .75rem',background:'none',border:'none',color:'var(--text-secondary)',cursor:'pointer',fontSize:'.8125rem',fontFamily:'inherit',width:'100%',textAlign:'center'}}>
            {Icon.Heart({width:16,height:16})} Send a tip
          </button>
        </div>
        <div className="sidebar-version">v3.31</div>
      </nav>

      <div className="app-body">
        {/* Desktop sidebar */}
        <aside className={`sidebar ${sidebarCollapsed?'collapsed':''}`}>
          <nav className="sidebar-nav">
            {NAV_ITEMS.filter(item=> item.key!=='vault' || effectiveSettings.showVault!==false).map(item=>(
              <button key={item.key} className={`sidebar-item ${tab===item.key?'active':''}`} onClick={()=>setTab(item.key)} title={sidebarCollapsed?item.label:undefined}>
                {Icon[item.icon]({width:18,height:18})}
                <span className="sidebar-item-label">{item.label}</span>
              </button>
            ))}
          </nav>
          <div className="sidebar-theme">
            <button className={`sidebar-theme-toggle ${theme}`} onClick={()=>setTheme(t=>t==='light'?'dark':'light')} title={sidebarCollapsed?(theme==='light'?'Dark mode':'Light mode'):(theme==='light'?'Switch to dark mode':'Switch to light mode')}>
              <div className="toggle-knob"/>
            </button>
            <span className="sidebar-theme-label" style={{display:'flex',alignItems:'center',gap:'.375rem'}}>{theme==='dark' ? Icon.Moon({width:14,height:14}) : Icon.Sun({width:14,height:14})} {theme==='dark' ? 'Dark mode' : 'Light mode'}</span>
          </div>
          <div className="sidebar-utility-links" style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
            <button onClick={()=>setShowGuide(true)} title="How it works" style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.375rem .75rem',background:'none',border:'none',color:'var(--text-secondary)',cursor:'pointer',fontSize:'.8125rem',fontFamily:'inherit',width:'100%',justifyContent:'center',textAlign:'center'}}>
              {Icon.HelpCircle({width:16,height:16})} {!sidebarCollapsed && 'How it works'}
            </button>
            <button onClick={()=>setShowTipJar(true)} title="Send a tip" style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.375rem .75rem',background:'none',border:'none',color:'var(--text-secondary)',cursor:'pointer',fontSize:'.8125rem',fontFamily:'inherit',width:'100%',justifyContent:'center',textAlign:'center'}}>
              {Icon.Heart({width:16,height:16})} {!sidebarCollapsed && 'Send a tip'}
            </button>
          </div>
          <div className="sidebar-version">v3.31</div>
        </aside>

        <main className="main" style={effectiveSettings.bgDots===false?{backgroundImage:'none'}:{}}>
        {/* ── DASHBOARD ── */}
        {tab==='dashboard' && (
          <>
            {/* Transfer wizard banner */}
            {(()=>{
              const incomplete = transactions.filter(t=>t.type==='Transfer'&&(!t.wallet||!t.wallet2)); // Consolidation excluded — same-wallet fee tx
              if(!incomplete.length) return null;
              return (
                <div style={{background:'rgba(217,119,6,.08)',border:'1px solid #d97706',borderRadius:12,padding:'1rem 1.5rem',marginBottom:'1.25rem',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'1rem',flexWrap:'wrap'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                    <span style={{color:'#d97706',display:'flex'}}>{Icon.Warning({width:22,height:22})}</span>
                    <div>
